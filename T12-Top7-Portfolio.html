<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T12: Top 7 Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0c10;--surface:#111318;--border:#1e2230;--accent:#f4813f;--text:#e8eaf0;--muted:#6b7280;--card:#13161f;--red:#ef4444;--green:#10b981;--gold:#f4813f;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:0 0 80px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(244,129,63,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(244,129,63,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  header{position:relative;z-index:1;padding:28px 24px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(244,129,63,0.06) 0%,transparent 100%);}
  .header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .title-block{display:flex;align-items:center;gap:12px;}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);}
  .logo span{color:var(--accent);}
  .subtitle{font-size:12px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
  .home-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(244,129,63,0.12);border:1px solid rgba(244,129,63,0.3);color:var(--accent);text-decoration:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;}
  .refresh-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
  .badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px;}
  .badge{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);}
  .badge.ok{color:var(--green);border-color:rgba(16,185,129,0.3);}
  .badge.loading{color:#f59e0b;border-color:rgba(245,158,11,0.3);}
  .badge.err{color:var(--red);border-color:rgba(239,68,68,0.3);}
  .summary-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;padding:20px 24px;}
  .sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .sum-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;font-family:'DM Mono',monospace;}
  .sum-value{font-size:20px;font-weight:700;font-family:'Syne',sans-serif;}
  .sum-value.green{color:var(--green);}.sum-value.red{color:var(--red);}
  .sum-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;}
  .sort-bar{position:relative;z-index:1;display:flex;align-items:center;gap:8px;padding:0 24px 16px;flex-wrap:wrap;}
  .sort-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
  .sort-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all 0.2s;}
  .sort-btn:hover,.sort-btn.active{background:rgba(244,129,63,0.15);border-color:rgba(244,129,63,0.4);color:var(--accent);}
  .positions{position:relative;z-index:1;padding:0 24px;display:flex;flex-direction:column;gap:10px;}
  .pos-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;}
  .pos-card.winner{border-left:3px solid var(--green);}
  .pos-card.loser{border-left:3px solid var(--red);}
  .pos-ticker{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
  .pos-name,.pos-qty{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;}
  .pos-broker{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;margin-top:4px;}
  .pos-broker.IBKR{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);}
  .pos-broker.TIGER{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
  .pos-right{text-align:right;}
  .pos-price{font-family:'DM Mono',monospace;font-size:17px;font-weight:600;color:var(--gold);}
  .pos-price-fx{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:1px;}
  .pos-pnl{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;margin-top:4px;}
  .pos-pnl.up{color:var(--green);}.pos-pnl.down{color:var(--red);}
  .pos-value{font-family:'DM Mono',monospace;font-size:12px;margin-top:2px;}
  .pos-invested{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .timestamp{position:relative;z-index:1;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:20px 24px 0;}
  .loading{text-align:center;color:var(--muted);font-size:14px;padding:40px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<!-- PIN LOCK SCREEN -->
<div id="pin-overlay" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0d1117,#161b22);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-size:2em;">🔒</div>
  <div style="font-size:1.15em;font-weight:700;color:#e6edf3;font-family:sans-serif;letter-spacing:0.05em;">Portfolio Dashboard</div>
  <div style="font-size:0.85em;color:#8b949e;font-family:monospace;">Enter PIN to access</div>
  <div style="display:flex;gap:12px;margin:8px 0;" id="pin-dots">
    <div class="pd"></div><div class="pd"></div><div class="pd"></div>
    <div class="pd"></div><div class="pd"></div><div class="pd"></div>
  </div>
  <div id="pin-error" style="color:#f87171;font-size:0.85em;font-family:monospace;min-height:20px;text-align:center;"></div>
  <div style="display:grid;grid-template-columns:repeat(3,72px);gap:12px;">
    <button class="pk" onclick="pinKey('1')">1</button>
    <button class="pk" onclick="pinKey('2')">2</button>
    <button class="pk" onclick="pinKey('3')">3</button>
    <button class="pk" onclick="pinKey('4')">4</button>
    <button class="pk" onclick="pinKey('5')">5</button>
    <button class="pk" onclick="pinKey('6')">6</button>
    <button class="pk" onclick="pinKey('7')">7</button>
    <button class="pk" onclick="pinKey('8')">8</button>
    <button class="pk" onclick="pinKey('9')">9</button>
    <button class="pk" onclick="pinKey('clr')" style="color:#f87171;font-size:1.1em;">⌫</button>
    <button class="pk" onclick="pinKey('0')">0</button>
    <button class="pk" onclick="pinKey('ok')" style="color:#10b981;font-size:0.9em;font-weight:800;">OK</button>
  </div>
</div>
<style>
  .pd{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);transition:background 0.15s;}
  .pd.filled{background:#f0a500;border-color:#f0a500;}
  .pk{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#e6edf3;font-size:1.35em;font-weight:700;cursor:pointer;transition:background 0.15s;font-family:sans-serif;}
  .pk:active{background:rgba(240,165,0,0.25);}
</style>
<script>
(function(){
  var C='121062',SK='t20_auth_v1';
  if(localStorage.getItem(SK)==='1'){document.getElementById('pin-overlay').style.display='none';return;}
  var entered='';
  window.pinKey=function(k){
    var err=document.getElementById('pin-error');
    err.textContent='';
    if(k==='clr'){entered=entered.slice(0,-1);}
    else if(k==='ok'){check();}
    else{if(entered.length<6)entered+=k;if(entered.length===6)check();}
    document.querySelectorAll('.pd').forEach(function(d,i){d.classList.toggle('filled',i<entered.length);});
  };
  function check(){
    if(entered===C){localStorage.setItem(SK,'1');document.getElementById('pin-overlay').style.display='none';}
    else{document.getElementById('pin-error').textContent='Incorrect PIN. Try again.';entered='';document.querySelectorAll('.pd').forEach(function(d){d.classList.remove('filled');});}
  }
  document.addEventListener('keydown',function(e){
    if(document.getElementById('pin-overlay').style.display==='none')return;
    if(e.key>='0'&&e.key<='9')pinKey(e.key);
    else if(e.key==='Backspace')pinKey('clr');
    else if(e.key==='Enter')pinKey('ok');
  });
})();
</script>


<header>
  <div class="header-top">
    <div class="title-block">
      <a href="/tools.html" class="home-btn">🏠 Home</a>
      <div>
        <div class="logo">📊 T12: <span>Top 7 Portfolio</span></div>
        <div class="subtitle">T12 · Live prices · IBKR + Tiger · SGD</div>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">🔄 Refresh</button>
    <a href="T12-netprofit.html" style="display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#10b981;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;">📈 Net Profit</a>
  </div>
  <div class="badges">
    <span class="badge loading" id="posStatus">⟳ Loading…</span>
    <span class="badge loading" id="priceStatus">⟳ Prices…</span>
    <span class="badge" id="fxBadge">FX loading…</span>
    <span class="badge" id="fetchTime">—</span>
  </div>
</header>

<div class="summary-grid">
  <div class="sum-card"><div class="sum-label">Total Value</div><div class="sum-value" id="sumValue">—</div><div class="sum-sub">SGD · live prices</div></div>
  <div class="sum-card"><div class="sum-label">Total Invested</div><div class="sum-value" id="sumInvested">—</div><div class="sum-sub">SGD</div></div>
  <div class="sum-card"><div class="sum-label">Total P&amp;L</div><div class="sum-value" id="sumPnl">—</div><div class="sum-sub" id="sumPnlPct"></div></div>
  <div class="sum-card"><div class="sum-label">Positions</div><div class="sum-value" id="sumCount">—</div><div class="sum-sub" id="sumWinLoss"></div></div>
</div>

<div class="sort-bar">
  <span class="sort-label">Sort:</span>
  <button class="sort-btn" onclick="sortBy('ticker',this)">Ticker</button>
  <button class="sort-btn" onclick="sortBy('pnlPct',this)">P&amp;L %</button>
  <button class="sort-btn active" onclick="sortBy('value',this)">Value</button>
  <button class="sort-btn" onclick="sortBy('invested',this)">Invested</button>
</div>

<div class="positions" id="positionList"><div class="loading">⟳ Fetching live data…</div></div>
<div class="timestamp" id="timestamp"></div>

<script>
const IBKR_URL  = 'https://raw.githubusercontent.com/paulyeo11/Dynamic-Index/refs/heads/main/positions.json';
const TIGER_URL = 'https://raw.githubusercontent.com/paulyeo11/Dynamic-Index/refs/heads/main/tiger_positions.json';
const PRICE_API = '/api/td';

const NAME_MAP = {
  'FDS':'FactSet Research','POOL':'Pool Corp','ZTS':'Zoetis','AAPL':'Apple','NVDA':'Nvidia',
  'GRAB':'Grab','1211.HK':'BYD','1810.HK':'Xiaomi','2318.HK':'Ping An',
  '2800.HK':'Tracker Fund','3067.HK':'CSOP MSCI HK','3690.HK':'Meituan',
  '6862.HK':'Haidilao','9618.HK':'JD.com','9988.HK':'Alibaba',
  '9999.HK':'NetEase','9888.HK':'Baidu','CFA.SI':'CapitaLand Fund',
  'Z74.SI':'Singtel','C38U.SI':'CapitaLand IntCom','G13.SI':'Genting','MG-OPT':'M&G Optimal Income','PIMCO-M':'PIMCO Balanced M','PIMCO-UM':'PIMCO Balanced UM',
  'J69U.SI':'Mapletree Ind','K71U.SI':'Keppel DC REIT','N2IU.SI':'Mapletree Log'
};

let fxRates     = { USD:1.285, HKD:0.172, SGD:1 };
let livePrices  = {};
let allPositions= [];
let currentSort = 'value';

// Convert symbol to Yahoo format
function yahooSym(p) {
  const cur = (p.currency||'').toUpperCase();
  const sym = p.symbol||'';
  if (cur==='HKD') return parseInt(sym,10)+'.HK';
  if (cur==='SGD' && !sym.includes('.')) return sym+'.SI';
  return sym;
}

function setBadge(id, cls, html) {
  const el = document.getElementById(id);
  el.className = 'badge '+cls;
  el.innerHTML = html;
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⟳ Loading…'; btn.style.pointerEvents='none';
  setBadge('posStatus','loading','⟳ Loading positions…');
  setBadge('priceStatus','loading','⟳ Loading prices…');

  try {
    // Step 1: broker positions
    const [iRes, tRes] = await Promise.all([
      fetch(IBKR_URL+'?t='+Date.now()),
      fetch(TIGER_URL+'?t='+Date.now())
    ]);
    const ibkr  = iRes.ok  ? await iRes.json()  : {positions:[]};
    const tiger = tRes.ok  ? await tRes.json()  : {positions:[]};

    document.getElementById('fetchTime').textContent =
      '📂 '+(ibkr.fetchedAt||tiger.fetchedAt||'—');

    const ibkrPos  = (ibkr.positions ||[]).map(p=>({...p, broker:'IBKR',  qty:p.position||0}));
    const tigerPos = (tiger.positions||[]).map(p=>({...p, broker:'TIGER', qty:p.quantity||0}));
    const raw = [...ibkrPos, ...tigerPos].filter(p=>p.qty>0);

    setBadge('posStatus','ok','✓ '+raw.length+' positions loaded');

    // Step 2: live prices via /api/td
    const ySyms   = [...new Set(raw.map(yahooSym))];
    const allSyms = [...ySyms,'USDSGD=X','HKDSGD=X'];
    let priceLoaded = 0;

    try {
      const pRes = await fetch(PRICE_API+'?symbols='+encodeURIComponent(allSyms.join(',')));
      if (!pRes.ok) throw new Error('HTTP '+pRes.status);
      const map = await pRes.json();

      if (map['USDSGD=X']?.price) fxRates.USD = parseFloat(map['USDSGD=X'].price);
      if (map['HKDSGD=X']?.price) fxRates.HKD = parseFloat(map['HKDSGD=X'].price);

      ySyms.forEach(s => {
        const q = map[s];
        if (q && !q.error && q.price!=null) {
          livePrices[s] = parseFloat(q.price);
          if (q.name) NAME_MAP[s] = q.name;
          priceLoaded++;
        }
      });
      setBadge('priceStatus', priceLoaded>0?'ok':'err',
        priceLoaded>0
          ? '<span class="live-dot"></span>'+priceLoaded+'/'+ySyms.length+' live'
          : '⚠ No prices');
    } catch(e) {
      setBadge('priceStatus','err','⚠ '+e.message);
    }

    document.getElementById('fxBadge').textContent =
      'USD/SGD: '+fxRates.USD.toFixed(4)+' · HKD/SGD: '+fxRates.HKD.toFixed(4);

    // Step 3: compute each position
    // KEY FIX: use broker's marketValue × FX for VALUE (avoids bad qty data)
    //          use live price only for display price per share
    allPositions = raw.map(p => {
      const ys   = yahooSym(p);
      const cur  = (p.currency||'USD').toUpperCase();
      const fx   = fxRates[cur]||1;
      const qty  = p.qty;
      const avg  = p.avgCost||0;
      const hkKey= parseInt(p.symbol,10)+'.HK';
      const name = NAME_MAP[ys]||NAME_MAP[hkKey]||NAME_MAP[p.symbol]||p.symbol;

      // VALUE: always from broker marketValue × FX (accurate, not distorted by bad qty)
      const mktValLocal = p.marketValue||0;
      const valueSGD    = mktValLocal * fx;

      // INVESTED: avgCost per share × qty × fx
      const investedSGD = avg * qty * fx;

      // DISPLAY PRICE: live from Yahoo if available, else implied from broker
      const livePriceLocal = livePrices[ys];
      const priceLocal = livePriceLocal != null ? livePriceLocal
                       : (qty>0 ? mktValLocal/qty : 0);
      const priceSGD   = priceLocal * fx;

      return {ticker:p.symbol, name, qty, currency:cur, broker:p.broker,
              ys, priceLocal, priceSGD, valueSGD, investedSGD,
              isLive: livePriceLocal != null};
    });

    // Sort all by value, pick top 7
    allPositions.sort((a,b)=>b.valueSGD-a.valueSGD);
    allPositions = allPositions.slice(0,7);

    render();

  } catch(e) {
    setBadge('posStatus','err','⚠ '+e.message);
    document.getElementById('positionList').innerHTML =
      '<div class="loading">⚠ '+e.message+'</div>';
  }

  btn.textContent='🔄 Refresh'; btn.style.pointerEvents='';
}

const fmt   = n=>'S$'+n.toLocaleString('en-SG',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtFx = (n,c)=>(c==='USD'?'US$':c==='HKD'?'HK$':'S$')+
              Math.abs(n).toLocaleString('en-SG',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct   = p=>p.investedSGD>0?((p.valueSGD-p.investedSGD)/p.investedSGD)*100:null;

function sortBy(by,btn){
  currentSort=by;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

function render(){
  const s=[...allPositions];
  if(currentSort==='pnlPct')    s.sort((a,b)=>(pct(b)||0)-(pct(a)||0));
  else if(currentSort==='value')     s.sort((a,b)=>b.valueSGD-a.valueSGD);
  else if(currentSort==='invested')  s.sort((a,b)=>b.investedSGD-a.investedSGD);
  else                               s.sort((a,b)=>a.ticker.localeCompare(b.ticker));

  const list=document.getElementById('positionList');
  if(!s.length){list.innerHTML='<div class="loading">No data</div>';updateSummary();return;}

  list.innerHTML=s.map(p=>{
    const pp=pct(p), hasPnl=pp!==null&&p.investedSGD>0;
    const cls=hasPnl?(pp>=0?'winner':'loser'):'';
    return `<div class="pos-card ${cls}">
      <div>
        <div class="pos-ticker">${p.ticker}</div>
        <div class="pos-name">${p.name}</div>
        <div class="pos-qty">qty: ${p.qty.toLocaleString()}</div>
        <span class="pos-broker ${p.broker}">${p.broker}</span>
      </div>
      <div class="pos-right">
        <div class="pos-price">${p.isLive?'<span class="live-dot"></span>':''}${fmt(p.priceSGD)}</div>
        <div class="pos-price-fx">(${fmtFx(p.priceLocal,p.currency)})</div>
        ${hasPnl?`<div class="pos-pnl ${pp>=0?'up':'down'}">${pp>=0?'▲':'▼'} ${pp>=0?'+':''}${pp.toFixed(2)}%</div>`:''}
        <div class="pos-value">${fmt(p.valueSGD)}</div>
        ${p.investedSGD>0?`<div class="pos-invested">invested ${fmt(p.investedSGD)}</div>`:''}
      </div>
    </div>`;
  }).join('');
  updateSummary();
}

function updateSummary(){
  const tv=allPositions.reduce((s,p)=>s+p.valueSGD,0);
  const ti=allPositions.reduce((s,p)=>s+p.investedSGD,0);
  const pnl=ti>0?tv-ti:null, pp=ti>0?((tv-ti)/ti)*100:null;
  const w=allPositions.filter(p=>(pct(p)||0)>0).length;
  const l=allPositions.filter(p=>(pct(p)||0)<0).length;
  document.getElementById('sumValue').textContent=fmt(tv);
  document.getElementById('sumInvested').textContent=ti>0?fmt(ti):'—';
  const pe=document.getElementById('sumPnl');
  if(pnl!==null){
    pe.textContent=(pnl>=0?'+':'')+fmt(pnl);
    pe.className='sum-value '+(pnl>=0?'green':'red');
    document.getElementById('sumPnlPct').textContent=(pp>=0?'+':'')+pp.toFixed(2)+'%';
  }else{pe.textContent='—';pe.className='sum-value';}
  document.getElementById('sumCount').textContent=allPositions.length;
  document.getElementById('sumWinLoss').textContent=`${w} up · ${l} down`;
  const now=new Date();
  document.getElementById('timestamp').textContent='Updated: '+
    now.toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'})+' '+
    now.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});
}

loadAll();
</script>
</body>
</html>
