<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Paul's World</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card { max-width: 420px; }
  .icon { font-size: 4rem; margin-bottom: 16px; }
  h1 { font-size: 1.8rem; margin-bottom: 12px; }
  p { opacity: 0.85; line-height: 1.5; margin-bottom: 24px; }
  .zh { display: none; }
  body.lang-zh .zh { display: inline; }
  body.lang-zh .en { display: none; }
  .lang-toggle { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; }
  .lang-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.75); font-size: 0.85rem; padding: 6px 16px; border-radius: 20px; cursor: pointer; }
  .lang-btn.active { background: rgba(244,165,0,0.25); border-color: rgba(244,165,0,0.7); color: #ffd700; font-weight: 700; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  button, a.btn {
    background: #f4813f; color: #fff; border: none; font-weight: 700;
    padding: 12px 28px; border-radius: 30px; cursor: pointer; font-size: 1rem;
    text-decoration: none; display: inline-block;
  }
  a.btn.secondary { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.35); }
</style>
</head>
<body>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('zh')">🇨🇳 中文</button>
  </div>
  <div class="card">
    <div class="icon">📡</div>
    <h1><span class="en">You're offline</span><span class="zh">您已离线</span></h1>
    <p>
      <span class="en">This page hasn't been visited before, so it isn't saved for offline reading yet. Pages you've already opened will still work without a connection.</span>
      <span class="zh">这个页面之前没有打开过，还没有保存供离线阅读。您已经打开过的页面在没有网络时仍然可以查看。</span>
    </p>
    <div class="btn-row">
      <button onclick="location.reload()"><span class="en">Try Again</span><span class="zh">重试</span></button>
      <a class="btn secondary" href="/index.html"><span class="en">🏠 Home</span><span class="zh">🏠 首页</span></a>
    </div>
  </div>
  <script>
    function setLang(l) {
      document.body.classList.toggle('lang-zh', l === 'zh');
      document.querySelectorAll('.lang-btn').forEach(function(b, i) {
        b.classList.toggle('active', (l === 'en' && i === 0) || (l === 'zh' && i === 1));
      });
    }
  </script>
<script src="/sw-register.js" defer></script>
</body>
</html>
