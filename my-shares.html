<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shares — Live Prices</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
    }

    .home-btn {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 100;
        background: rgba(255,255,255,0.95);
        color: #667eea;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        padding: 10px 16px;
        border-radius: 24px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        transition: transform .2s ease;
    }
    .home-btn:hover { transform: translateY(-2px); }

    .container { max-width: 820px; margin: 0 auto; }

    header {
        text-align: center;
        color: #fff;
        margin: 60px 0 22px;
    }
    header h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
    header p { opacity: 0.9; margin-top: 8px; font-size: 14px; }

    /* control bar */
    .controlbar {
        background: rgba(255,255,255,0.97);
        border-radius: 16px;
        padding: 16px 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        margin-bottom: 20px;
    }
    .controls-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: #888;
        flex-wrap: wrap;
        gap: 10px;
    }
    .pulse {
        display: inline-block;
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #4ade80;
        margin-right: 6px;
        vertical-align: middle;
        animation: pulse 2s infinite;
    }
    .pulse.paused { background: #f59e0b; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .toggle-btn {
        background: #f3f4f6; border: 0; color: #555;
        font-weight: 700; font-size: 12px;
        padding: 7px 14px; border-radius: 20px; cursor: pointer;
    }
    .toggle-btn:hover { background: #e5e7eb; }

    .hint { font-size: 12px; color: #aaa; margin-top: 12px; line-height: 1.5; }
    .hint a { color: #667eea; }
    .keylink { color: #667eea; cursor: pointer; text-decoration: underline; font-weight: 600; }

    /* message slot */
    .msg { padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 16px; }
    .msg.error { background: #fee2e2; color: #b91c1c; }
    .msg.info  { background: #eef0ff; color: #4f56b5; }

    /* grid of stock cards */
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
    }

    .card {
        background: rgba(255,255,255,0.97);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        display: flex;
        flex-direction: column;
    }
    .card.loading { opacity: 0.6; }

    .card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
    }
    .ticker { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .name { font-size: 12px; color: #888; margin-top: 2px; line-height: 1.3; }

    .price { font-size: 40px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-top: 14px; }

    .change-pill {
        display: inline-block;
        font-size: 14px;
        font-weight: 700;
        padding: 5px 12px;
        border-radius: 8px;
        margin-top: 8px;
        align-self: flex-start;
    }
    .change-pill.positive { background: #dcfce7; color: #16a34a; }
    .change-pill.negative { background: #fee2e2; color: #dc2626; }
    .change-pill.neutral  { background: #f3f4f6; color: #6b7280; }

    /* sparkline */
    .spark-wrap { margin-top: 14px; height: 48px; }
    .spark { width: 100%; height: 48px; display: block; }
    .spark-empty { font-size: 11px; color: #bbb; padding-top: 16px; text-align: center; }

    /* mini stats */
    .ministats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid #f0f0f3;
    }
    .ministat { text-align: center; }
    .ministat .label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: .4px; }
    .ministat .val { font-size: 14px; font-weight: 700; margin-top: 3px; }

    .card-err { font-size: 13px; color: #b91c1c; margin-top: 14px; font-weight: 600; }

    /* cost / P&L block */
    .costblock {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid #f0f0f3;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }
    .costblock .ci { text-align: center; }
    .costblock .label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: .4px; }
    .costblock .val { font-size: 14px; font-weight: 700; margin-top: 3px; }
    .pl-pill {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
        padding: 6px 10px;
        border-radius: 8px;
    }
    .pl-pill.positive { background: #dcfce7; color: #16a34a; }
    .pl-pill.negative { background: #fee2e2; color: #dc2626; }
    .pl-pill.neutral  { background: #f3f4f6; color: #6b7280; }

    .setcost-hint {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed #ececf2;
        font-size: 11px;
        color: #b8b8c2;
        text-align: center;
    }

    /* "Edit my costs" button on control bar */
    .cost-btn {
        background: #eef0ff; border: 0; color: #4f56b5;
        font-weight: 700; font-size: 12px;
        padding: 7px 14px; border-radius: 20px; cursor: pointer;
        margin-left: 6px;
    }
    .cost-btn:hover { background: #e2e6ff; }

    /* inline cost editor */
    .cost-editor {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid #f0f0f3;
    }
    .cost-editor h3 { font-size: 13px; color: #444; margin-bottom: 10px; }
    .cost-rows { display: flex; flex-direction: column; gap: 10px; }
    .cost-row { display: flex; align-items: center; gap: 10px; }
    .cost-row label { flex: 0 0 56px; font-weight: 700; font-size: 13px; color: #555; }
    .cost-row .prefix {
        flex: 1; display: flex; align-items: center;
        background: #f7f7fb; border: 1px solid #e6e6ef; border-radius: 10px;
        padding: 0 10px; overflow: hidden;
    }
    .cost-row .prefix span { color: #999; font-size: 14px; }
    .cost-row input {
        flex: 1; border: 0; background: transparent; outline: none;
        font-size: 14px; padding: 9px 4px; color: #333; min-width: 0;
    }
    .cost-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .cost-save {
        background: #667eea; border: 0; color: #fff; font-weight: 700; font-size: 13px;
        padding: 9px 18px; border-radius: 10px; cursor: pointer;
    }
    .cost-save:hover { background: #5563d6; }
    .cost-cancel, .cost-clear {
        background: #f3f4f6; border: 0; color: #555; font-weight: 700; font-size: 13px;
        padding: 9px 18px; border-radius: 10px; cursor: pointer;
    }
    .cost-cancel:hover { background: #e5e7eb; }
    .cost-clear { color: #b91c1c; background: #fee2e2; }
    .cost-clear:hover { background: #fcd5d5; }
    .cost-note { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.5; }

    footer {
        text-align: center;
        color: rgba(255,255,255,0.85);
        font-size: 13px;
        padding: 24px 0 10px;
    }
    footer a { color: #fff; font-weight: 600; }

    @media (max-width: 720px) {
        .grid { grid-template-columns: 1fr; }
        .price { font-size: 44px; }
        header h1 { font-size: 24px; }
    }
</style>
</head>
<body>

<a class="home-btn" href="https://paulsworld.vercel.app/">&#8962; Home</a>

<div class="container">

    <header>
        <h1>My Shares</h1>
        <p>Live prices of my holdings &middot; auto-refreshing every 10s</p>
    </header>

    <!-- Control bar -->
    <div class="controlbar">
        <div class="controls-row">
            <span><span class="pulse" id="pulse"></span><span id="liveLabel">Live</span> &middot; <span id="lastUpdated">--</span></span>
            <span>
                <button class="cost-btn" id="costBtn">&#9999;&#65039; Edit my costs</button>
                <button class="toggle-btn" id="pauseBtn">Pause</button>
            </span>
        </div>
        <!-- inline cost editor renders here -->
        <div id="costEditor"></div>
        <div class="hint">
            Powered by Finnhub. <span class="keylink" id="changeKey">&#9881; change key</span>
            &middot; Get a free key at <a href="https://finnhub.io" target="_blank" rel="noopener">finnhub.io</a>.
            <br>&#9888; US tickers &mdash; handled well on the free tier.
        </div>
    </div>

    <!-- Message slot (global notices) -->
    <div id="msgSlot"></div>

    <!-- Stock cards render here -->
    <div class="grid" id="grid"></div>

    <footer>
        &copy; 2026 Paul's World &middot; <a href="https://paulsworld.vercel.app/">paulsworld.vercel.app</a>
    </footer>

</div>

<script>
(function () {
    "use strict";

    /* =======================================================================
       HOLDINGS  —  EDIT THIS LIST to add / remove the stocks shown.
       Each entry: { symbol: "TICKER", name: "Optional display name" }
       - "symbol" must be a valid Finnhub US ticker.
       - "name" is optional; if left blank the app fetches it from Finnhub.
       ======================================================================= */
    var HOLDINGS = [
        { symbol: "FDS",  name: "FactSet Research Systems" },
        { symbol: "POOL", name: "Pool Corporation" },
        { symbol: "ZTS",  name: "Zoetis" }
    ];

    /* ----------------------------------------------------------------------- */

    var KEY_STORE  = "finnhub_api_key";   // SAME key name as live-price.html (reused)
    var COST_STORE = "my_shares_costs";   // PRIVATE per-device cost basis map (localStorage only)
    var REFRESH_MS = 10000;               // auto-refresh interval (10s)
    var MAX_POINTS = 40;                  // sparkline rolling buffer length

    var els = {
        grid:        document.getElementById("grid"),
        pulse:       document.getElementById("pulse"),
        liveLabel:   document.getElementById("liveLabel"),
        lastUpdated: document.getElementById("lastUpdated"),
        pauseBtn:    document.getElementById("pauseBtn"),
        changeKey:   document.getElementById("changeKey"),
        msgSlot:     document.getElementById("msgSlot"),
        costBtn:     document.getElementById("costBtn"),
        costEditor:  document.getElementById("costEditor")
    };

    var state = {
        paused: false,
        timer: null,
        editingCosts: false,
        lastPrice: {}, // symbol -> last live close price (for re-rendering P&L on cost save)
        stocks: {}   // symbol -> { series:[], name:"", refs:{} }
    };

    /* ---------- storage: API key ---------- */
    function getKey()  { try { return localStorage.getItem(KEY_STORE) || ""; } catch(e){ return ""; } }
    function setKey(k) { try { localStorage.setItem(KEY_STORE, k); } catch(e){} }

    /* ---------- storage: private cost basis (localStorage only, never hardcoded) ---------- */
    function getCosts() {
        try {
            var raw = localStorage.getItem(COST_STORE);
            if (!raw) return {};
            var obj = JSON.parse(raw);
            return (obj && typeof obj === "object") ? obj : {};
        } catch(e){ return {}; }
    }
    function setCosts(map) {
        try { localStorage.setItem(COST_STORE, JSON.stringify(map || {})); } catch(e){}
    }
    function getCost(sym) {
        var c = getCosts()[sym];
        var n = (c === 0 || c) ? Number(c) : NaN;
        return (isFinite(n) && n > 0) ? n : null;
    }

    /* ---------- messaging (global slot) ---------- */
    function showMsg(text, type) {
        els.msgSlot.innerHTML = '<div class="msg ' + (type||"info") + '">' + text + '</div>';
    }
    function clearMsg() { els.msgSlot.innerHTML = ""; }

    /* ---------- API key flow ---------- */
    function ensureKey(force) {
        var k = getKey();
        if (k && !force) return k;
        var entered = window.prompt(
            "Paste your free Finnhub API key (saved on this device only).\n\nGet one at finnhub.io → Dashboard."
        );
        if (entered && entered.trim()) {
            setKey(entered.trim());
            clearMsg();
            return entered.trim();
        }
        return "";
    }
    function showKeyPrompt() {
        showMsg('Enter your free Finnhub API key to see live prices. <span class="keylink" id="setKeyLink">Enter key</span>', "info");
        var l = document.getElementById("setKeyLink");
        if (l) l.onclick = function(){ if (ensureKey(true)) refreshAll(); };
    }

    /* ---------- formatting ---------- */
    function fmt(n) {
        if (n === null || n === undefined || isNaN(n)) return "--";
        return Number(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
    function timeStr() { return new Date().toLocaleTimeString(); }

    /* ---------- build the card DOM for each holding ---------- */
    function buildCards() {
        els.grid.innerHTML = "";
        HOLDINGS.forEach(function (h) {
            var sym = (h.symbol || "").trim().toUpperCase();
            if (!sym) return;

            state.stocks[sym] = { series: [], name: h.name || "", refs: {} };

            var card = document.createElement("div");
            card.className = "card loading";
            card.innerHTML =
                '<div class="card-head">' +
                    '<div>' +
                        '<div class="ticker">' + sym + '</div>' +
                        '<div class="name" data-name>' + (h.name || "—") + '</div>' +
                    '</div>' +
                    '<div class="change-pill neutral" data-change>--</div>' +
                '</div>' +
                '<div class="price" data-price>--</div>' +
                '<div class="spark-wrap">' +
                    '<svg class="spark" viewBox="0 0 200 48" preserveAspectRatio="none" data-spark></svg>' +
                    '<div class="spark-empty" data-sparkempty>Collecting prices…</div>' +
                '</div>' +
                '<div class="ministats">' +
                    '<div class="ministat"><div class="label">High</div><div class="val" data-high>--</div></div>' +
                    '<div class="ministat"><div class="label">Low</div><div class="val" data-low>--</div></div>' +
                    '<div class="ministat"><div class="label">Prev</div><div class="val" data-prev>--</div></div>' +
                '</div>' +
                '<div class="costblock" data-costblock style="display:none">' +
                    '<div class="ci"><div class="label">Avg Cost</div><div class="val" data-avgcost>--</div></div>' +
                    '<div class="ci"><div class="label">Per Share</div><div class="val" data-pershare>--</div></div>' +
                    '<div class="pl-pill neutral" data-pl>--</div>' +
                '</div>' +
                '<div class="setcost-hint" data-setcost style="display:none">No cost set &middot; tap &#9999;&#65039; Edit my costs to add yours</div>' +
                '<div class="card-err" data-err style="display:none"></div>';

            els.grid.appendChild(card);

            state.stocks[sym].refs = {
                card:       card,
                name:       card.querySelector("[data-name]"),
                change:     card.querySelector("[data-change]"),
                price:      card.querySelector("[data-price]"),
                spark:      card.querySelector("[data-spark]"),
                sparkEmpty: card.querySelector("[data-sparkempty]"),
                high:       card.querySelector("[data-high]"),
                low:        card.querySelector("[data-low]"),
                prev:       card.querySelector("[data-prev]"),
                costblock:  card.querySelector("[data-costblock]"),
                avgcost:    card.querySelector("[data-avgcost]"),
                pershare:   card.querySelector("[data-pershare]"),
                pl:         card.querySelector("[data-pl]"),
                setcost:    card.querySelector("[data-setcost]"),
                err:        card.querySelector("[data-err]")
            };

            // show cost/hint state immediately (price arrives on first refresh)
            renderCost(sym);
        });
    }

    /* ---------- hand-rolled SVG sparkline ---------- */
    function drawSpark(sym) {
        var st = state.stocks[sym];
        var s = st.series, refs = st.refs;
        if (!refs) return;
        if (s.length < 2) {
            refs.spark.innerHTML = "";
            refs.sparkEmpty.style.display = "block";
            return;
        }
        refs.sparkEmpty.style.display = "none";

        var W = 200, H = 48, pad = 3;
        var min = Math.min.apply(null, s);
        var max = Math.max.apply(null, s);
        if (min === max) { min -= 1; max += 1; }
        var range = max - min;

        function x(i){ return pad + (i / (s.length - 1)) * (W - pad*2); }
        function y(v){ return pad + (1 - (v - min) / range) * (H - pad*2); }

        var pts = s.map(function(v,i){ return x(i) + "," + y(v); });
        var up = s[s.length-1] >= s[0];
        var stroke = up ? "#16a34a" : "#dc2626";
        var fill   = up ? "rgba(22,163,74,0.12)" : "rgba(220,38,38,0.12)";

        var area = "M" + x(0) + "," + (H - pad) + " L" + pts.join(" L ") + " L" + x(s.length-1) + "," + (H - pad) + " Z";
        var line = "M" + pts.join(" L ");
        var lastX = x(s.length-1), lastY = y(s[s.length-1]);

        refs.spark.innerHTML =
            '<path d="' + area + '" fill="' + fill + '" stroke="none"></path>' +
            '<path d="' + line + '" fill="none" stroke="' + stroke + '" stroke-width="1.5" vector-effect="non-scaling-stroke"></path>' +
            '<circle cx="' + lastX + '" cy="' + lastY + '" r="2.5" fill="' + stroke + '"></circle>';
    }

    /* ---------- render one quote into its card ---------- */
    function renderQuote(sym, q) {
        var st = state.stocks[sym];
        if (!st) return;
        var refs = st.refs;

        refs.card.classList.remove("loading");
        refs.err.style.display = "none";

        refs.price.textContent = "$" + fmt(q.c);

        var d = q.d, dp = q.dp;
        refs.change.className = "change-pill " + (d > 0 ? "positive" : d < 0 ? "negative" : "neutral");
        var sign = d > 0 ? "+" : "";
        refs.change.textContent = sign + fmt(d) + " (" + sign + (dp != null ? Number(dp).toFixed(2) : "--") + "%)";

        refs.high.textContent = fmt(q.h);
        refs.low.textContent  = fmt(q.l);
        refs.prev.textContent = fmt(q.pc);

        st.series.push(q.c);
        if (st.series.length > MAX_POINTS) st.series.shift();
        drawSpark(sym);

        // remember the live price so cost edits can re-render P&L instantly
        state.lastPrice[sym] = q.c;
        renderCost(sym);
    }

    /* ---------- render the cost / P&L block (live price vs avg cost) ---------- */
    function renderCost(sym) {
        var st = state.stocks[sym];
        if (!st || !st.refs) return;
        var refs = st.refs;

        var cost = getCost(sym);
        var price = state.lastPrice[sym];

        // no cost recorded on this device -> hide P&L, show subtle hint
        if (cost === null) {
            refs.costblock.style.display = "none";
            refs.setcost.style.display = "block";
            return;
        }

        refs.setcost.style.display = "none";
        refs.costblock.style.display = "grid";
        refs.avgcost.textContent = "$" + fmt(cost);

        // need a live price to compute the difference
        if (price === null || price === undefined || isNaN(price)) {
            refs.pershare.textContent = "--";
            refs.pl.className = "pl-pill neutral";
            refs.pl.textContent = "Waiting for price…";
            return;
        }

        var diff = price - cost;                 // $ gain/loss per share
        var pct  = (diff / cost) * 100;          // % difference
        refs.pershare.textContent = (diff >= 0 ? "+$" : "-$") + fmt(Math.abs(diff));

        var cls = diff > 0 ? "positive" : diff < 0 ? "negative" : "neutral";
        var sign = diff > 0 ? "+" : diff < 0 ? "" : "";
        refs.pl.className = "pl-pill " + cls;
        refs.pl.textContent = sign + pct.toFixed(2) + "%  vs avg cost";
    }

    function renderCardError(sym, text) {
        var st = state.stocks[sym];
        if (!st) return;
        st.refs.card.classList.remove("loading");
        st.refs.err.textContent = text;
        st.refs.err.style.display = "block";
    }

    /* ---------- fetch one quote ---------- */
    function fetchQuote(sym) {
        var key = getKey();
        if (!key) { showKeyPrompt(); return; }

        var url = "https://finnhub.io/api/v1/quote?symbol=" + encodeURIComponent(sym) + "&token=" + encodeURIComponent(key);
        fetch(url)
            .then(function(r){
                if (r.status === 401 || r.status === 403) throw {type:"auth"};
                if (r.status === 429) throw {type:"rate"};
                if (!r.ok) throw {type:"net"};
                return r.json();
            })
            .then(function(q){
                // Finnhub returns all zeros for unknown symbols
                if (!q || (q.c === 0 && q.h === 0 && q.l === 0 && q.pc === 0)) {
                    throw {type:"notfound"};
                }
                renderQuote(sym, q);
            })
            .catch(function(err){ handleError(err, sym); });
    }

    /* ---------- fetch company name (optional, only if missing) ---------- */
    function fetchName(sym) {
        var st = state.stocks[sym];
        if (!st || st.name) return;   // already have a name from HOLDINGS
        var key = getKey();
        if (!key) return;
        var url = "https://finnhub.io/api/v1/stock/profile2?symbol=" + encodeURIComponent(sym) + "&token=" + encodeURIComponent(key);
        fetch(url)
            .then(function(r){ return r.ok ? r.json() : {}; })
            .then(function(p){
                if (p && p.name) {
                    st.name = p.name;
                    if (st.refs && st.refs.name) st.refs.name.textContent = p.name;
                }
            })
            .catch(function(){ /* name is optional */ });
    }

    /* ---------- error handling ---------- */
    function handleError(err, sym) {
        var t = err && err.type;
        if (t === "auth") {
            showMsg('Invalid API key. <span class="keylink" id="reKey">Enter a new key</span>.', "error");
            var rk = document.getElementById("reKey");
            if (rk) rk.onclick = function(){ if (ensureKey(true)) refreshAll(); };
        } else if (t === "rate") {
            showMsg("Rate limit reached (free tier ~60 calls/min). Auto-refresh will retry shortly.", "info");
        } else if (t === "notfound") {
            renderCardError(sym, "Ticker not found");
        } else {
            showMsg("Network hiccup reaching Finnhub. Will retry on next refresh.", "info");
        }
    }

    /* ---------- refresh all holdings ---------- */
    function refreshAll() {
        if (!getKey()) { showKeyPrompt(); return; }
        clearMsg();
        Object.keys(state.stocks).forEach(function(sym, i){
            // tiny stagger to be gentle on the rate limit
            setTimeout(function(){
                fetchName(sym);
                fetchQuote(sym);
            }, i * 250);
        });
        els.lastUpdated.textContent = "updated " + timeStr();
    }

    /* ---------- auto-refresh timer ---------- */
    function tick() {
        if (state.paused) return;
        if (!getKey()) return;
        refreshAll();
    }
    function restartTimer() {
        if (state.timer) clearInterval(state.timer);
        state.timer = setInterval(tick, REFRESH_MS);
    }
    function setPaused(p) {
        state.paused = p;
        els.pauseBtn.textContent = p ? "Resume" : "Pause";
        els.pulse.className = "pulse" + (p ? " paused" : "");
        els.liveLabel.textContent = p ? "Paused" : "Live";
    }

    /* ---------- inline cost editor ---------- */
    function closeCostEditor() {
        state.editingCosts = false;
        els.costEditor.innerHTML = "";
        els.costBtn.textContent = "✏️ Edit my costs";
    }

    function openCostEditor() {
        if (state.editingCosts) { closeCostEditor(); return; }
        state.editingCosts = true;
        els.costBtn.textContent = "Close editor";

        var costs = getCosts();
        var rows = HOLDINGS.map(function (h) {
            var sym = (h.symbol || "").trim().toUpperCase();
            var existing = (costs[sym] === 0 || costs[sym]) ? costs[sym] : "";
            return (
                '<div class="cost-row">' +
                    '<label for="cost_' + sym + '">' + sym + '</label>' +
                    '<div class="prefix"><span>$</span>' +
                        '<input id="cost_' + sym + '" data-sym="' + sym + '" type="number" step="0.01" min="0" ' +
                            'inputmode="decimal" placeholder="avg cost / share" value="' + existing + '">' +
                    '</div>' +
                '</div>'
            );
        }).join("");

        els.costEditor.innerHTML =
            '<div class="cost-editor">' +
                '<h3>Your average cost per share</h3>' +
                '<div class="cost-rows">' + rows + '</div>' +
                '<div class="cost-actions">' +
                    '<button class="cost-save" id="costSave">Save</button>' +
                    '<button class="cost-cancel" id="costCancel">Cancel</button>' +
                    '<button class="cost-clear" id="costClear">Clear all</button>' +
                '</div>' +
                '<div class="cost-note">Stored only in this browser (localStorage) &middot; never uploaded or shared. ' +
                    'Leave a field blank to remove that holding’s cost.</div>' +
            '</div>';

        document.getElementById("costSave").onclick = saveCostEditor;
        document.getElementById("costCancel").onclick = closeCostEditor;
        document.getElementById("costClear").onclick = function () {
            if (window.confirm("Remove all saved average costs from this device?")) {
                setCosts({});
                HOLDINGS.forEach(function (h) { renderCost((h.symbol || "").trim().toUpperCase()); });
                closeCostEditor();
            }
        };
        // Enter key inside any field saves
        var inputs = els.costEditor.querySelectorAll("input");
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener("keydown", function (e) {
                if (e.key === "Enter") { e.preventDefault(); saveCostEditor(); }
            });
        }
    }

    function saveCostEditor() {
        var map = {};
        var inputs = els.costEditor.querySelectorAll("input[data-sym]");
        for (var i = 0; i < inputs.length; i++) {
            var sym = inputs[i].getAttribute("data-sym");
            var raw = (inputs[i].value || "").trim();
            if (raw === "") continue;            // blank = no cost for this ticker
            var n = Number(raw);
            if (isFinite(n) && n > 0) map[sym] = n;
        }
        setCosts(map);
        HOLDINGS.forEach(function (h) { renderCost((h.symbol || "").trim().toUpperCase()); });
        closeCostEditor();
        showMsg("Average costs saved on this device.", "info");
        setTimeout(clearMsg, 2500);
    }

    /* ---------- wire up ---------- */
    els.pauseBtn.onclick = function(){ setPaused(!state.paused); };
    els.costBtn.onclick  = openCostEditor;
    els.changeKey.onclick = function(){
        if (ensureKey(true)) { showMsg("API key updated.", "info"); refreshAll(); }
    };

    buildCards();
    restartTimer();

    if (!getKey()) {
        showKeyPrompt();
    } else {
        refreshAll();
    }
})();
</script>

<script src="/view-counter.js"></script>

</body>
</html>
