<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Home-screen icon: investment chart -->
  <link rel="apple-touch-icon" href="/investment-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/investment-icon-180.png">
  <link rel="icon" type="image/png" href="/investment-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="My Investments">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>My Investment Tools</title>
  <style>
    html,body{height:100%;margin:0;}
    body{display:flex;align-items:center;justify-content:center;flex-direction:column;
      font-family:'Segoe UI',Arial,sans-serif;background:#0e1330;color:#fff;text-align:center;}
    .spin{width:46px;height:46px;border:4px solid rgba(255,255,255,.25);border-top-color:#10b981;
      border-radius:50%;animation:s .9s linear infinite;margin-bottom:18px;}
    @keyframes s{to{transform:rotate(360deg);}}
    p{opacity:.85;font-size:.95rem;letter-spacing:.04em;}
  </style>
  <script>
    // Unlock & open the (hidden) Investment Tools, always fresh
    location.replace('/?tools=1&fresh=' + Date.now());
  </script>
</head>
<body>
  <div class="spin"></div>
  <p>Opening your Investment Tools…</p>
</body>
</html>
