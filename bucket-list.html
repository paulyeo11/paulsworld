<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dream Destinations — Paul's Bucket List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(160deg, #eff6ff 0%, #f0f9ff 50%, #f5f3ff 100%); min-height: 100vh; font-size: 17px; }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #3b82f6 60%, #6366f1 100%);
      padding: 32px 20px 28px; text-align: center; position: relative;
    }
    .home-btn {
      position: absolute; top: 16px; left: 16px;
      background: rgba(255,255,255,0.18); color: white;
      padding: 8px 16px; border-radius: 20px;
      text-decoration: none; font-size: 0.9em; font-weight: 600;
    }
    .header h1 { color: white; font-size: 1.7em; font-weight: 800; margin-bottom: 4px; }
    .header p { color: rgba(255,255,255,0.85); font-size: 1em; margin-bottom: 18px; }
    .progress-box { background: rgba(255,255,255,0.15); border-radius: 14px; padding: 14px 18px; max-width: 340px; margin: 0 auto; }
    .progress-row { display: flex; justify-content: space-between; color: white; font-size: 0.9em; margin-bottom: 8px; }
    .progress-bar-bg { background: rgba(255,255,255,0.25); border-radius: 20px; height: 10px; }
    .progress-bar-fill { background: #4ade80; height: 10px; border-radius: 20px; transition: width 0.5s; }

    .container { max-width: 560px; margin: 0 auto; padding: 0 16px 60px; }
    .add-btn {
      display: block; width: 100%; margin: 20px 0 0;
      padding: 15px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white; font-size: 1.05em; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 15px rgba(99,102,241,0.35);
    }
    #save-indicator { text-align: center; font-size: 0.85em; color: #22c55e; min-height: 20px; margin: 6px 0 0; }

    .stats-row { display: flex; gap: 10px; margin: 16px 0 0; }
    .stat-box { flex: 1; background: white; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .stat-num { font-size: 1.6em; font-weight: 800; }
    .stat-lbl { font-size: 0.78em; color: #64748b; margin-top: 2px; }

    .filters { margin: 16px 0 0; display: flex; flex-direction: column; gap: 10px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; color: #64748b; font-size: 0.85em; cursor: pointer; font-weight: 500; }
    .filter-btn.active-status { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; font-weight: 700; }
    .filter-btn.active-priority { border-color: #6366f1; background: #f5f3ff; color: #4f46e5; font-weight: 700; }
    .filter-btn.active-cat { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; font-weight: 700; }
    .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; flex-wrap: nowrap; }
    .cat-scroll::-webkit-scrollbar { height: 3px; }

    #item-list { margin-top: 18px; }
    .empty-state { text-align: center; padding: 50px 20px; color: #94a3b8; }
    .empty-state .big { font-size: 3em; margin-bottom: 12px; }

    /* ITEM CARD */
    .item-card { border-radius: 16px; margin-bottom: 14px; border: 1.5px solid; overflow: hidden; transition: opacity 0.2s; }
    .item-card.done { opacity: 0.72; }

    /* Photo banner */
    .item-photo { width: 100%; height: 140px; object-fit: cover; display: block; }
    .item-photo-placeholder { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 2em; background: rgba(0,0,0,0.04); }

    .item-body-wrap { padding: 14px 16px; }
    .item-top { display: flex; align-items: flex-start; gap: 12px; }
    .check-btn {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      border: 2.5px solid; background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; margin-top: 2px;
    }
    .check-btn.done-btn { background: #22c55e; border-color: #22c55e; color: white; }
    .item-content { flex: 1; min-width: 0; }
    .item-title { font-size: 1.05em; font-weight: 700; word-break: break-word; }
    .item-title.struck { text-decoration: line-through; color: #94a3b8; }
    .item-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; align-items: center; }
    .badge { font-size: 0.78em; padding: 2px 10px; border-radius: 20px; font-weight: 700; color: white; }
    .meta-text { font-size: 0.82em; color: #64748b; }
    .done-date { font-size: 0.82em; color: #22c55e; font-weight: 600; }
    .notes-toggle { font-size: 0.82em; color: #3b82f6; background: none; border: none; cursor: pointer; padding: 0; margin-top: 6px; display: block; }
    .notes-text { font-size: 0.88em; color: #475569; margin-top: 6px; line-height: 1.5; display: none; }
    .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .edit-btn { background: #e0f2fe; border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 0.9em; color: #0369a1; }
    .del-btn { background: #fee2e2; border: none; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 0.9em; color: #dc2626; }

    /* MODAL */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.48); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .overlay.hidden { display: none; }
    .modal { background: white; border-radius: 20px; padding: 28px 22px; width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto; }
    .modal h2 { font-size: 1.15em; color: #1e293b; margin-bottom: 20px; }
    label { display: block; font-size: 0.88em; font-weight: 600; color: #475569; margin-bottom: 5px; }
    input[type=text], input[type=date], select, textarea {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 1.0em; margin-bottom: 16px;
      color: #1e293b; font-family: inherit; outline: none;
    }
    textarea { resize: vertical; }
    .priority-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .pri-btn { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-size: 0.95em; color: #64748b; }
    .pri-btn.selected-High { border-color: #ef4444; background: #fef2f2; color: #991b1b; font-weight: 700; }
    .pri-btn.selected-Medium { border-color: #f59e0b; background: #fffbeb; color: #78350f; font-weight: 700; }
    .pri-btn.selected-Low { border-color: #22c55e; background: #f0fdf4; color: #14532d; font-weight: 700; }

    /* Wiki preview */
    .wiki-preview { margin-bottom: 16px; border-radius: 12px; overflow: hidden; display: none; }
    .wiki-preview img { width: 100%; max-height: 160px; object-fit: cover; display: block; }
    .wiki-preview-label { font-size: 0.78em; color: #64748b; padding: 5px 10px; background: #f8fafc; }
    .wiki-searching { font-size: 0.85em; color: #3b82f6; margin-bottom: 12px; display: none; }
    .wiki-btn { 
      width: 100%; padding: 10px; border-radius: 10px; border: 1.5px dashed #3b82f6;
      background: #eff6ff; color: #1d4ed8; font-size: 0.95em; font-weight: 600;
      cursor: pointer; margin-bottom: 16px;
    }

    .modal-btns { display: flex; gap: 10px; margin-top: 8px; }
    .cancel-btn { flex: 1; padding: 13px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: white; cursor: pointer; font-size: 1.0em; color: #64748b; }
    .save-btn { flex: 2; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; cursor: pointer; font-size: 1.0em; font-weight: 700; }
  </style>
</head>
<body>

  <div class="header">
    <a href="https://paulsworld.vercel.app/" class="home-btn">🏠 Home</a>
    <div style="font-size:2.2em;margin-bottom:6px;">🌍</div>
    <h1>Paul's Bucket List</h1>
    <p>Dreams, destinations & adventures to chase</p>
    <div class="progress-box" id="progress-box" style="display:none;">
      <div class="progress-row">
        <span id="prog-text">0 of 0 achieved</span>
        <span id="prog-pct" style="font-weight:700;">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <button class="add-btn" onclick="openModal()">+ Add Dream / Goal</button>
    <div id="save-indicator"></div>

    <div class="stats-row" id="stats-row" style="display:none;">
      <div class="stat-box"><div class="stat-num" id="stat-total" style="color:#3b82f6">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-done" style="color:#22c55e">0</div><div class="stat-lbl">Done ✓</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-pending" style="color:#f59e0b">0</div><div class="stat-lbl">Pending</div></div>
    </div>

    <div class="filters" id="filters" style="display:none;">
      <div class="filter-row">
        <button class="filter-btn active-status" data-type="status" onclick="setFilter('status','All',this)">All</button>
        <button class="filter-btn" data-type="status" onclick="setFilter('status','Pending',this)">Pending</button>
        <button class="filter-btn" data-type="status" onclick="setFilter('status','Done',this)">Done ✓</button>
        <button class="filter-btn active-priority" data-type="priority" onclick="setFilter('priority','All',this)">All Priority</button>
        <button class="filter-btn" data-type="priority" onclick="setFilter('priority','High',this)">🔴 High</button>
        <button class="filter-btn" data-type="priority" onclick="setFilter('priority','Medium',this)">🟡 Medium</button>
        <button class="filter-btn" data-type="priority" onclick="setFilter('priority','Low',this)">🟢 Low</button>
      </div>
      <div class="cat-scroll" id="cat-filters">
        <button class="filter-btn active-cat" onclick="setFilter('cat','All',this)">All Categories</button>
        <button class="filter-btn" onclick="setFilter('cat','Adventure',this)">🏔️ Adventure</button>
        <button class="filter-btn" onclick="setFilter('cat','Travel',this)">✈️ Travel</button>
        <button class="filter-btn" onclick="setFilter('cat','Personal',this)">⭐ Personal</button>
        <button class="filter-btn" onclick="setFilter('cat','Health',this)">💪 Health</button>
        <button class="filter-btn" onclick="setFilter('cat','Learning',this)">📚 Learning</button>
        <button class="filter-btn" onclick="setFilter('cat','Family',this)">❤️ Family</button>
        <button class="filter-btn" onclick="setFilter('cat','Faith',this)">🙏 Faith</button>
        <button class="filter-btn" onclick="setFilter('cat','Other',this)">📌 Other</button>
      </div>
    </div>

    <div id="item-list"></div>
  </div>

  <!-- MODAL -->
  <div class="overlay hidden" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">✨ Add to Bucket List</h2>
      <input type="hidden" id="edit-id" value="">

      <label>Dream / Goal *</label>
      <input type="text" id="inp-title" placeholder="e.g. Sail the Adriatic in Croatia" oninput="onTitleInput()">

      <button class="wiki-btn" onclick="fetchWikiPhoto()">🔍 Fetch Photo from Wikipedia</button>
      <div class="wiki-searching" id="wiki-searching">🔍 Searching Wikipedia…</div>
      <div class="wiki-preview" id="wiki-preview">
        <img id="wiki-img" src="" alt="">
        <div class="wiki-preview-label" id="wiki-label"></div>
      </div>
      <input type="hidden" id="inp-photo" value="">

      <label>Category</label>
      <select id="inp-cat">
        <option>Adventure</option><option>Travel</option><option>Personal</option>
        <option>Health</option><option>Learning</option><option>Family</option>
        <option>Faith</option><option>Other</option>
      </select>

      <label>Priority</label>
      <div class="priority-row">
        <button class="pri-btn" onclick="selectPriority('High')">🔴 High</button>
        <button class="pri-btn selected-Medium" onclick="selectPriority('Medium')">🟡 Medium</button>
        <button class="pri-btn" onclick="selectPriority('Low')">🟢 Low</button>
      </div>
      <input type="hidden" id="inp-priority" value="Medium">

      <label>Target Date (optional)</label>
      <input type="date" id="inp-date">

      <label>Notes / Details (optional)</label>
      <textarea id="inp-notes" rows="3" placeholder="Why is this on your list?"></textarea>

      <div class="modal-btns">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="save-btn" onclick="saveItem()">Add to List 🎯</button>
      </div>
    </div>
  </div>

  <br>
  <script src="/view-counter.js"></script>

  <script>
    const STORAGE_KEY = 'pauls_bucket_list_v1';
    const PRIORITY_COLORS = {
      High:   { bg:'#fef2f2', border:'#fca5a5', badge:'#ef4444' },
      Medium: { bg:'#fffbeb', border:'#fcd34d', badge:'#f59e0b' },
      Low:    { bg:'#f0fdf4', border:'#86efac', badge:'#22c55e' }
    };
    const CAT_ICONS = { Adventure:'🏔️', Travel:'✈️', Personal:'⭐', Health:'💪', Learning:'📚', Family:'❤️', Faith:'🙏', Other:'📌' };

    let items = [];
    let filterStatus = 'All', filterPriority = 'All', filterCat = 'All';
    let wikiPhotoUrl = '';

    function loadItems() {
      try { items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { items = []; }
    }
    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      const ind = document.getElementById('save-indicator');
      ind.textContent = '✓ Saved';
      setTimeout(() => ind.textContent = '', 1200);
    }

    // ── WIKIPEDIA PHOTO FETCH ──
    function onTitleInput() {
      // Reset wiki photo when title changes
      document.getElementById('wiki-preview').style.display = 'none';
      document.getElementById('inp-photo').value = '';
      wikiPhotoUrl = '';
    }

    async function fetchWikiPhoto() {
      const title = document.getElementById('inp-title').value.trim();
      if (!title) { alert('Please enter a dream or goal first!'); return; }

      document.getElementById('wiki-searching').style.display = 'block';
      document.getElementById('wiki-preview').style.display = 'none';
      wikiPhotoUrl = '';

      try {
        // Search Wikipedia for the term
        const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(title)}&format=json&origin=*&srlimit=1`;
        const searchRes = await fetch(searchUrl);
        const searchData = await searchRes.json();
        const pages = searchData.query?.search;
        if (!pages || pages.length === 0) throw new Error('Not found');

        const pageTitle = pages[0].title;

        // Get the page image
        const imgUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(pageTitle)}&prop=pageimages&format=json&origin=*&pithumbsize=600`;
        const imgRes = await fetch(imgUrl);
        const imgData = await imgRes.json();
        const page = Object.values(imgData.query.pages)[0];

        document.getElementById('wiki-searching').style.display = 'none';

        if (page.thumbnail?.source) {
          wikiPhotoUrl = page.thumbnail.source;
          document.getElementById('inp-photo').value = wikiPhotoUrl;
          document.getElementById('wiki-img').src = wikiPhotoUrl;
          document.getElementById('wiki-label').textContent = `📸 Wikipedia: "${pageTitle}"`;
          document.getElementById('wiki-preview').style.display = 'block';
        } else {
          alert(`No photo found for "${pageTitle}" on Wikipedia. Try a more specific name.`);
        }
      } catch (e) {
        document.getElementById('wiki-searching').style.display = 'none';
        alert('Could not fetch photo. Check your internet or try a different name.');
      }
    }

    // ── RENDER ──
    function render() {
      const total = items.length;
      const done = items.filter(i => i.done).length;
      const pct = total ? Math.round(done/total*100) : 0;

      if (total > 0) {
        document.getElementById('progress-box').style.display = '';
        document.getElementById('stats-row').style.display = '';
        document.getElementById('filters').style.display = '';
        document.getElementById('prog-text').textContent = `${done} of ${total} achieved`;
        document.getElementById('prog-pct').textContent = pct + '%';
        document.getElementById('prog-fill').style.width = pct + '%';
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-done').textContent = done;
        document.getElementById('stat-pending').textContent = total - done;
      } else {
        document.getElementById('progress-box').style.display = 'none';
        document.getElementById('stats-row').style.display = 'none';
        document.getElementById('filters').style.display = 'none';
      }

      let filtered = items.filter(i => {
        if (filterStatus === 'Done' && !i.done) return false;
        if (filterStatus === 'Pending' && i.done) return false;
        if (filterPriority !== 'All' && i.priority !== filterPriority) return false;
        if (filterCat !== 'All' && i.category !== filterCat) return false;
        return true;
      });
      filtered = [...filtered.filter(i=>!i.done), ...filtered.filter(i=>i.done)];

      const list = document.getElementById('item-list');
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="big">${total===0?'🌟':'🔍'}</div><p>${total===0?'Your bucket list is empty — add your first dream!':'No items match this filter.'}</p></div>`;
        return;
      }

      list.innerHTML = filtered.map(item => {
        const c = PRIORITY_COLORS[item.priority] || PRIORITY_COLORS.Medium;
        const icon = CAT_ICONS[item.category] || '📌';
        const photoHtml = item.photo
          ? `<img class="item-photo" src="${item.photo}" alt="${escHtml(item.title)}" onerror="this.style.display='none'">`
          : `<div class="item-photo-placeholder">${icon}</div>`;
        return `
          <div class="item-card ${item.done?'done':''}" style="background:${item.done?'#f8f9fa':c.bg};border-color:${item.done?'#e2e8f0':c.border};">
            ${photoHtml}
            <div class="item-body-wrap">
              <div class="item-top">
                <button class="check-btn ${item.done?'done-btn':''}" style="border-color:${item.done?'#22c55e':c.badge};" onclick="toggleDone('${item.id}')">${item.done?'✓':''}</button>
                <div class="item-content">
                  <div class="item-title ${item.done?'struck':''}">${icon} ${escHtml(item.title)}</div>
                  <div class="item-meta">
                    <span class="badge" style="background:${c.badge}">${item.priority}</span>
                    <span class="meta-text">${item.category}</span>
                    ${item.targetDate?`<span class="meta-text">🗓 ${item.targetDate}</span>`:''}
                    ${item.doneDate?`<span class="done-date">✅ ${item.doneDate}</span>`:''}
                  </div>
                  ${item.notes?`<button class="notes-toggle" onclick="toggleNotes(this)">▼ Show notes</button><div class="notes-text">${escHtml(item.notes)}</div>`:''}
                </div>
                <div class="item-actions">
                  <button class="edit-btn" onclick="openEdit('${item.id}')">✏️</button>
                  <button class="del-btn" onclick="deleteItem('${item.id}')">🗑</button>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function toggleDone(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.done = !item.done;
      item.doneDate = item.done ? new Date().toLocaleDateString() : null;
      saveItems(); render();
    }
    function deleteItem(id) {
      if (!confirm('Remove this from your bucket list?')) return;
      items = items.filter(i => i.id !== id);
      saveItems(); render();
    }
    function toggleNotes(btn) {
      const el = btn.nextElementSibling;
      if (el.style.display === 'block') { el.style.display='none'; btn.textContent='▼ Show notes'; }
      else { el.style.display='block'; btn.textContent='▲ Hide notes'; }
    }

    function setFilter(type, val, btn) {
      if (type==='status') { filterStatus=val; document.querySelectorAll('[data-type="status"]').forEach(b=>b.classList.remove('active-status')); btn.classList.add('active-status'); }
      else if (type==='priority') { filterPriority=val; document.querySelectorAll('[data-type="priority"]').forEach(b=>b.classList.remove('active-priority')); btn.classList.add('active-priority'); }
      else { filterCat=val; document.querySelectorAll('#cat-filters .filter-btn').forEach(b=>b.classList.remove('active-cat')); btn.classList.add('active-cat'); }
      render();
    }

    function openModal() {
      document.getElementById('edit-id').value = '';
      document.getElementById('modal-title').textContent = '✨ Add to Bucket List';
      document.getElementById('inp-title').value = '';
      document.getElementById('inp-cat').value = 'Adventure';
      document.getElementById('inp-date').value = '';
      document.getElementById('inp-notes').value = '';
      document.getElementById('inp-photo').value = '';
      document.getElementById('wiki-preview').style.display = 'none';
      document.getElementById('wiki-searching').style.display = 'none';
      wikiPhotoUrl = '';
      selectPriority('Medium');
      document.querySelector('.save-btn').textContent = 'Add to List 🎯';
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function openEdit(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      document.getElementById('edit-id').value = id;
      document.getElementById('modal-title').textContent = '✏️ Edit Item';
      document.getElementById('inp-title').value = item.title;
      document.getElementById('inp-cat').value = item.category;
      document.getElementById('inp-date').value = item.targetDate || '';
      document.getElementById('inp-notes').value = item.notes || '';
      document.getElementById('inp-photo').value = item.photo || '';
      wikiPhotoUrl = item.photo || '';
      if (item.photo) {
        document.getElementById('wiki-img').src = item.photo;
        document.getElementById('wiki-label').textContent = '📸 Current photo';
        document.getElementById('wiki-preview').style.display = 'block';
      } else {
        document.getElementById('wiki-preview').style.display = 'none';
      }
      document.getElementById('wiki-searching').style.display = 'none';
      selectPriority(item.priority);
      document.querySelector('.save-btn').textContent = 'Save Changes';
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

    function selectPriority(p) {
      document.getElementById('inp-priority').value = p;
      document.querySelectorAll('.pri-btn').forEach(b => {
        b.className = 'pri-btn';
        if (b.textContent.includes(p === 'High' ? '🔴' : p === 'Medium' ? '🟡' : '🟢')) b.classList.add('selected-'+p);
      });
    }

    function saveItem() {
      const title = document.getElementById('inp-title').value.trim();
      if (!title) { alert('Please enter a dream or goal!'); return; }
      const photo = document.getElementById('inp-photo').value || '';
      const editId = document.getElementById('edit-id').value;
      if (editId) {
        const item = items.find(i => i.id === editId);
        if (item) {
          item.title = title;
          item.category = document.getElementById('inp-cat').value;
          item.priority = document.getElementById('inp-priority').value;
          item.targetDate = document.getElementById('inp-date').value;
          item.notes = document.getElementById('inp-notes').value.trim();
          item.photo = photo;
        }
      } else {
        items.unshift({
          id: Date.now().toString(), title,
          category: document.getElementById('inp-cat').value,
          priority: document.getElementById('inp-priority').value,
          targetDate: document.getElementById('inp-date').value,
          notes: document.getElementById('inp-notes').value.trim(),
          photo, done: false, doneDate: null,
          createdAt: new Date().toLocaleDateString()
        });
      }
      saveItems(); render(); closeModal();
    }

    loadItems(); render();
  </script>

</body>
</html>
