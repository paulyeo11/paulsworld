<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How AI Planned My Xinjiang Road Trip</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, system-ui, sans-serif;
    background: #0d1117; color: #e6edf3;
  }
  .header {
    padding: 16px 18px 10px; text-align: center;
  }
  .header h1 { font-size: 1.15em; margin: 0 0 4px; }
  .header p { font-size: 0.85em; color: #8b949e; margin: 0; }
  .map-wrap { position: relative; }
  #map { width: 100%; height: 62vh; }
  #map.map-fullscreen {
    position: fixed !important; top: 0; left: 0;
    width: 100vw !important; height: 100vh !important; height: 100dvh !important;
    z-index: 9999; border-radius: 0 !important;
  }
  .map-fullscreen-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(240,165,0,0.15); border: 1px solid rgba(240,165,0,0.4);
    color: #f0a500; font-size: 0.78em; font-weight: 700;
    padding: 6px 14px; border-radius: 18px; cursor: pointer;
    margin: 0 16px 10px;
  }
  #mapCloseBtn {
    display: none; position: fixed; top: 14px; right: 14px; z-index: 10000;
    background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 1rem; padding: 8px 16px; border-radius: 22px;
    cursor: pointer; align-items: center; gap: 6px;
  }
  .controls {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: #161b22; border-top: 1px solid rgba(255,255,255,0.08);
  }
  #status { font-size: 0.85em; color: #c9d1d9; flex: 1; }
  #timeLabel { font-weight: 700; color: #58a6ff; }
  .legend {
    padding: 10px 16px 18px; font-size: 0.8em; color: #8b949e; line-height: 1.7;
  }
  .legend span.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
  .speed-control {
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px 14px;
  }
  .speed-control label { font-size: 0.8em; color: #8b949e; white-space: nowrap; }
  .speed-control input[type=range] { flex: 1; accent-color: #f0a500; }
  .speed-control #speedVal { font-size: 0.8em; color: #58a6ff; font-weight: 700; width: 34px; text-align: right; }
  .speed-control.fs-overlay {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10000;
    background: rgba(13,17,23,0.9); backdrop-filter: blur(6px);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .home-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #21262d; color: #c9d1d9; text-decoration: none;
    padding: 10px 16px; border-radius: 8px; font-size: 0.95em; font-weight: 600;
    margin: 16px auto 0; width: fit-content;
  }
  .home-wrap { display: flex; justify-content: center; padding-bottom: 18px; }
  .view-counter-wrap { text-align: center; padding: 10px 0 20px; font-size: 0.8em; color: #8b949e; }
</style>
</head>
<body>

<div class="header">
  <h1>🚗 How AI Planned My Xinjiang Road Trip</h1>
  <p>16-day loop · Urumqi → Kanas Lake → Sayram Lake → Kuqa → Urumqi · ~4,800 km</p>
</div>

<button class="map-fullscreen-btn" onclick="openMapFullscreen()">&#9096; Open Full Screen Map</button>
<div class="map-wrap">
  <div id="map"></div>
  <div style="position:absolute;top:10px;right:48px;z-index:1000;display:flex;gap:4px;">
    <button onclick="setMapType('satellite')" id="btn-satellite" style="-webkit-appearance:none;appearance:none;background:rgba(0,0,0,0.55);color:#fff;border:1px solid rgba(255,255,255,0.5);border-radius:20px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;">🛰 Satellite</button>
    <button onclick="setMapType('street')" id="btn-street" style="-webkit-appearance:none;appearance:none;background:#f59e0b;color:#0d1117;border:none;border-radius:20px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;">🗺 Street</button>
  </div>
</div>
<button id="mapCloseBtn" onclick="closeMapFullscreen()">&#10005; Close Map</button>

<div class="controls">
  <div id="status">Day <span id="timeLabel">1</span> — <span id="placeLabel">Urumqi</span></div>
</div>

<div class="speed-control" id="speedControl">
  <label for="speedSlider">🐢 Speed</label>
  <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
  <span id="speedVal">1&times;</span>
</div>

<div class="legend">
  <span class="dot" style="background:#ef4444;"></span>Start / End&nbsp;&nbsp;
  <span class="dot" style="background:#3b82f6;"></span>Lake&nbsp;&nbsp;
  <span class="dot" style="background:#f0a500;"></span>City&nbsp;&nbsp;
  <span class="dot" style="background:#10b981;"></span>Village
</div>

<div class="home-wrap">
  <a class="home-btn" href="https://paulsworld.vercel.app/">🏠 Home</a>
</div>

<div class="view-counter-wrap">
  <script src="/view-counter.js"></script>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const stops = [
  { name: "Urumqi",           lat: 43.8200, lng: 87.6200, day: 1,  type: "start", wikiTitle: "Ürümqi" },
  { name: "Wulungu Lake",     lat: 47.1100, lng: 87.4800, day: 2,  type: "lake", wikiTitle: "Ulungur Lake" },
  { name: "Altay City",       lat: 47.8500, lng: 88.1300, day: 3,  type: "city", wikiTitle: "Altay City" },
  { name: "Hemu Village",     lat: 48.3500, lng: 86.5500, day: 4,  type: "village", wikiTitle: "Hemu, Xinjiang" },
  { name: "Kanas Lake",       lat: 48.6800, lng: 87.0000, day: 5,  type: "lake", wikiTitle: "Kanas Lake" },
  { name: "Burqin",           lat: 47.7100, lng: 86.8700, day: 6,  type: "city", wikiTitle: "Burqin County" },
  { name: "Kuytun City",      lat: 46.0800, lng: 84.6800, day: 7,  type: "city", wikiTitle: "Kuytun" },
  { name: "Sayram Lake",      lat: 44.6100, lng: 81.1700, day: 8,  type: "lake", wikiTitle: "Sayram Lake" },
  { name: "Dushanzi District", lat: 44.3200, lng: 84.8800, day: 9,  type: "city", wikiTitle: "Dushanzi District" },
  { name: "Nalati Grassland", lat: 43.3500, lng: 83.7000, day: 10, type: "village", wikiTitle: "Nalati Grassland" },
  { name: "Kuqa City",        lat: 41.7100, lng: 82.9600, day: 12, type: "city", wikiTitle: "Kuqa City" },
  { name: "Korla City",       lat: 41.7600, lng: 86.1400, day: 14, type: "city", wikiTitle: "Korla" },
  { name: "Urumqi (Return)",  lat: 43.8200, lng: 87.6200, day: 15, type: "end", wikiTitle: "Ürümqi" }
];

const typeColor = { start: '#ef4444', end: '#ef4444', lake: '#3b82f6', city: '#f0a500', village: '#10b981' };

function openMapFullscreen() {
  if (window.self !== window.top) {
    window.top.location.href = window.location.href;
    return;
  }
  document.getElementById('map').classList.add('map-fullscreen');
  document.getElementById('mapCloseBtn').style.display = 'flex';
  document.getElementById('speedControl').classList.add('fs-overlay');
  document.body.style.overflow = 'hidden';
  setTimeout(function () { map.invalidateSize(); }, 100);
}
function closeMapFullscreen() {
  document.getElementById('map').classList.remove('map-fullscreen');
  document.getElementById('mapCloseBtn').style.display = 'none';
  document.getElementById('speedControl').classList.remove('fs-overlay');
  document.body.style.overflow = '';
  setTimeout(function () { map.invalidateSize(); }, 100);
}

const map = L.map('map', { zoomControl: true }).setView([45.5, 85.5], 6);

const tileLayers = {
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 18 }),
  street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 19 })
};
tileLayers.street.addTo(map);
let currentTile = 'street';
function setMapType(type) {
  if (type === currentTile) return;
  map.removeLayer(tileLayers[currentTile]);
  tileLayers[type].addTo(map);
  currentTile = type;
  document.getElementById('btn-satellite').style.background = type === 'satellite' ? '#f59e0b' : 'rgba(0,0,0,0.55)';
  document.getElementById('btn-satellite').style.color = type === 'satellite' ? '#0d1117' : '#fff';
  document.getElementById('btn-street').style.background = type === 'street' ? '#f59e0b' : 'rgba(0,0,0,0.55)';
  document.getElementById('btn-street').style.color = type === 'street' ? '#0d1117' : '#fff';
}

const fullLine = stops.map(s => [s.lat, s.lng]);

for (let i = 0; i < stops.length - 1; i++) {
  L.polyline([fullLine[i], fullLine[i+1]], { color: '#f0a500', weight: 3, opacity: 0.8, dashArray: '6,8' }).addTo(map);
}

function popupHtml(s) {
  const imgHtml = s.img ? `<img src="${s.img}" style="width:100%;border-radius:6px 6px 0 0;display:block;margin-bottom:6px;max-height:120px;object-fit:cover;">` : '';
  return `<div>${imgHtml}<b>Day ${s.day} — ${s.name}</b></div>`;
}

const markerRefs = [];
stops.forEach((s, i) => {
  const marker = L.circleMarker([s.lat, s.lng], {
    radius: 7, color: '#0d1117', weight: 2, fillColor: typeColor[s.type], fillOpacity: 1
  }).addTo(map).bindPopup(popupHtml(s));
  markerRefs.push(marker);
});

// ── WIKIPEDIA PHOTO FALLBACK — for stops without one of Paul's own photos ──
function fetchWikiThumb(wikiTitle) {
  return fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(wikiTitle))
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) { return (d && d.thumbnail) ? d.thumbnail.source : null; })
    .catch(function () { return null; });
}
stops.forEach(function (s, i) {
  if (s.img || !s.wikiTitle) return;
  fetchWikiThumb(s.wikiTitle).then(function (src) {
    if (!src) return;
    s.img = src;
    markerRefs[i].setPopupContent(popupHtml(s));
  });
});

map.fitBounds(fullLine, { padding: [30, 30] });

const carIcon = L.divIcon({ html: '🚗', className: '', iconSize: [26,26], iconAnchor: [13,13] });
const mover = L.marker(fullLine[0], { icon: carIcon }).addTo(map);

const startDay = stops[0].day;
const endDay = stops[stops.length-1].day;
const totalDays = endDay - startDay;
let progress = 0;
let speedMultiplier = 1;

const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
speedSlider.addEventListener('input', () => {
  speedMultiplier = parseFloat(speedSlider.value);
  speedVal.textContent = speedMultiplier + '×';
});

function interpolate(p) {
  const targetDay = startDay + p * totalDays;
  for (let i = 0; i < stops.length - 1; i++) {
    const d0 = stops[i].day, d1 = stops[i+1].day;
    if (targetDay >= d0 && targetDay <= d1) {
      const segP = d1 > d0 ? (targetDay - d0) / (d1 - d0) : 0;
      const lat = stops[i].lat + (stops[i+1].lat - stops[i].lat) * segP;
      const lng = stops[i].lng + (stops[i+1].lng - stops[i].lng) * segP;
      const place = segP < 0.5 ? stops[i].name : stops[i+1].name;
      return { lat, lng, dayStr: Math.round(targetDay), place };
    }
  }
  return { lat: stops[stops.length-1].lat, lng: stops[stops.length-1].lng, dayStr: stops[stops.length-1].day, place: stops[stops.length-1].name };
}

const statusEl = document.getElementById('status');
const timeLabel = document.getElementById('timeLabel');
const placeLabel = document.getElementById('placeLabel');

function step() {
  progress += 0.0018 * speedMultiplier;
  if (progress >= 1) {
    const pos = interpolate(1);
    mover.setLatLng([pos.lat, pos.lng]);
    timeLabel.textContent = pos.dayStr;
    placeLabel.textContent = pos.place;
    statusEl.innerHTML = `Trip complete — Day <span id="timeLabel">${stops[stops.length-1].day}</span> · replaying...`;
    setTimeout(() => {
      progress = 0;
      statusEl.textContent = 'Day ';
      statusEl.appendChild(timeLabel);
      statusEl.appendChild(document.createTextNode(' — '));
      statusEl.appendChild(placeLabel);
      requestAnimationFrame(step);
    }, 1200);
    return;
  }
  const pos = interpolate(progress);
  mover.setLatLng([pos.lat, pos.lng]);
  timeLabel.textContent = pos.dayStr;
  placeLabel.textContent = pos.place;
  requestAnimationFrame(step);
}

statusEl.textContent = 'Day ';
statusEl.appendChild(timeLabel);
statusEl.appendChild(document.createTextNode(' — '));
statusEl.appendChild(placeLabel);
step();
</script>

</body>
</html>
