  <!-- Christchurch landing pin -->
  <g transform="translate(96,120)">
    <path d="M0 -13 c6 0 10 4 10 10 c0 8 -10 16 -10 16 c0 0 -10 -8 -10 -16 c0 -6 4 -10 10 -10 z" fill="#e63b2e" stroke="#fff" stroke-width="1.4"/>
