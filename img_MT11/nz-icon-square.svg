       c5 4 10 9 9 16
       c-1 6 -7 9 -13 9
       c-5 0 -9 -3 -13 -6
       c-4 -4 -8 -9 -13 -11
       c2 -7 5 -14 9 -20
       c3 -6 6 -13 12 -17
       c3 -2 6 -3 8 -6 z"/>
  <!-- South Island -->
  <path fill="url(#land)" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round"
    d="M108 92
       c6 1 11 4 13 10
       c2 6 -1 12 -5 17
       c-5 6 -11 11 -16 17
       c3 1 7 0 9 3
       c2 3 -1 6 -3 8
       c-5 5 -11 9 -18 11
       c-6 2 -13 2 -18 -2
       c-4 -3 -5 -9 -3 -14
       c3 -8 9 -14 15 -20
       c7 -7 14 -14 22 -20
       c1 -1 2 -2 3 -3
