<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --ink:#1a2e1a; --paper:#f4f7f4; --green:#2d6a4f; --lime:#52b788; --gold:#c9933a;
    --mist:#7a9e8a; --pale:#e8f0eb; --white:#fff; --ocean:#1b6ca8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:1rem;}

  /* NAV */
  nav#homeBar{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    background:var(--ink);padding:10px 14px;position:sticky;top:0;z-index:1200;
  }
  nav#homeBar a{
    background:rgba(255,255,255,0.12);color:#fff;text-decoration:none;border-radius:8px;
    padding:7px 13px;font-size:0.85rem;font-weight:500;display:inline-flex;align-items:center;gap:6px;
  }
  nav#homeBar a:hover{background:var(--green);}
  nav#homeBar .share-btn{
    background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.3);color:#fff;
    border-radius:8px;padding:7px 13px;font-size:0.85rem;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;
  }
  nav#homeBar .share-btn:hover{background:var(--green);}

  /* ROUTE TOGGLE */
  .route-toggle{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:14px 20px;background:var(--ink);}
  .route-btn{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.25);color:#fff;
    font-family:'Inter',sans-serif;font-weight:600;font-size:0.85rem;padding:9px 20px;border-radius:30px;
    cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s,border-color .2s;}
  .route-btn.active{background:var(--gold);border-color:var(--gold);color:#1a2e1a;}

  /* HERO */
  .hero{color:#fff;padding:44px 24px 40px;text-align:center;position:relative;overflow:hidden;transition:background 0.3s;}
  .hero.mid{background:linear-gradient(160deg,#1a2e1a 0%,#2d5a1b 45%,#1b6ca8 100%);}
  .hero.mid::before{content:'🥝';}
  .hero.south{background:linear-gradient(160deg,#12385f 0%,#1b6ca8 55%,#2d6a4f 100%);}
  .hero.south::before{content:'🐧';}
  .hero::before{position:absolute;font-size:16vw;opacity:0.07;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
  .hero-tag{font-family:'Space Mono',monospace;font-size:0.72rem;letter-spacing:0.2em;color:#a8d5b5;text-transform:uppercase;margin-bottom:12px;}
  .hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,6vw,3rem);font-weight:900;line-height:1.15;margin-bottom:10px;}
  .hero h1 span{color:#a8d5b5;}
  .hero-sub{font-size:1rem;color:rgba(255,255,255,0.72);margin-bottom:26px;font-weight:300;}
  .hero-stats{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
  .stat-pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:40px;padding:9px 20px;text-align:center;}
  .stat-pill .num{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:#a8d5b5;line-height:1;}
  .stat-pill .lbl{font-size:0.66rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:3px;}

  .share-toast{display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a2e1a;color:#fff;padding:11px 26px;border-radius:24px;font-size:0.9rem;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.3);}

  /* SECTION */
  .section{max-width:720px;margin:0 auto;padding:34px 20px;}
  .section-label{font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--mist);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--pale);}
  .intro{font-size:0.94rem;color:#555;line-height:1.6;margin-bottom:16px;}

  /* MAP */
  .map-openbtn{display:inline-flex;align-items:center;gap:8px;background:var(--ocean);color:#fff;border:none;border-radius:30px;padding:11px 22px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;margin-bottom:14px;box-shadow:0 3px 12px rgba(27,108,168,0.28);}
  .map-openbtn:hover{background:#12385f;}
  .map-wrap{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--pale);box-shadow:0 2px 14px rgba(26,46,26,0.06);}
  #nzMap{width:100%;height:440px;background:#cfe3f0;}
  .map-wrap.fs{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:3000;border-radius:0;border:none;}
  .map-wrap.fs #nzMap{height:100vh;}
  .map-typebtns{position:absolute;top:10px;right:48px;z-index:1000;display:flex;gap:4px;}
  .map-typebtns button{border-radius:20px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
  .map-closebtn{display:none;position:absolute;top:10px;left:10px;z-index:1001;background:#c0392b;color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:0.8rem;font-weight:700;cursor:pointer;}
  .map-wrap.fs .map-closebtn{display:block;}
  .map-legend{position:absolute;bottom:10px;left:10px;z-index:1000;background:rgba(255,255,255,0.92);border-radius:10px;padding:8px 12px;font-size:0.72rem;line-height:1.6;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  .map-legend .lg-row{display:flex;align-items:center;gap:7px;}
  .map-legend .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

  /* DISTANCE TABLE */
  .dist-table{width:100%;border-collapse:collapse;margin:16px 0 4px;font-size:0.85rem;}
  .dist-table th,.dist-table td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--pale);}
  .dist-table th{font-family:'Space Mono',monospace;font-size:0.66rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--mist);}
  .dist-table td:first-child{font-weight:600;color:var(--ink);}
  .dist-note{font-size:0.72rem;color:var(--mist);margin:4px 0 0;line-height:1.5;}

  /* ITINERARY STAGES */
  .stages{display:flex;flex-direction:column;gap:14px;}
  .stage{background:#fff;border:1px solid var(--pale);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(26,46,26,0.05);}
  .stage-head{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--pale);}
  .stage-badge{width:34px;height:34px;border-radius:50%;color:#fff;font-family:'Space Mono',monospace;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
  .stage-title{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:700;color:var(--ink);line-height:1.25;}
  .stage-dates{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--mist);margin-top:2px;}
  .stage-nights{background:var(--pale);border-radius:20px;padding:5px 11px;font-size:0.72rem;font-weight:700;color:var(--green);white-space:nowrap;}
  .stage-body{padding:14px 16px;}
  .stage-desc{font-size:0.9rem;color:#555;line-height:1.55;margin-bottom:10px;}
  .stage-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .stage-tag{background:var(--pale);border-radius:20px;padding:4px 11px;font-size:0.76rem;color:var(--ink);}
  .stage-tag.star{background:#fff3cd;color:#856404;font-weight:700;}
  .stage-map{display:inline-flex;align-items:center;gap:6px;margin-top:12px;text-decoration:none;font-size:0.78rem;font-weight:600;padding:8px 14px;border-radius:8px;background:rgba(66,133,244,0.15);border:1px solid rgba(66,133,244,0.4);color:#1a6fa0;}

  /* FINISH CARD */
  .finish{background:linear-gradient(135deg,#12385f 0%,#1b6ca8 100%);color:#fff;border-radius:16px;padding:20px;text-align:center;margin-top:14px;}
  .finish .f-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:6px;}
  .finish .f-sub{font-size:0.9rem;opacity:0.85;line-height:1.5;}

  /* TIPS */
  .tips{display:flex;flex-direction:column;gap:10px;}
  .tip{background:#fff;border:1px solid var(--pale);border-left:4px solid var(--green);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
  .tip.south-tip{border-left-color:var(--ocean);}
  .tip .t-ico{font-size:1.4rem;flex-shrink:0;}
  .tip .t-title{font-weight:600;font-size:0.96rem;margin-bottom:2px;}
  .tip .t-sub{font-size:0.85rem;color:#666;line-height:1.5;}

  .view-counter-wrap{text-align:center;padding:24px 20px 10px;color:var(--mist);font-size:0.85rem;font-family:'Space Mono',monospace;}
  footer{text-align:center;padding:20px;font-size:0.8rem;color:var(--mist);border-top:1px solid var(--pale);font-family:'Space Mono',monospace;}
  @media(max-width:420px){.hero h1{font-size:1.7rem;}.stat-pill .num{font-size:1.2rem;}}
</style>

    else {
      navigator.clipboard.writeText(url).then(function () {
        var t = document.getElementById('shareToast'); t.style.display = 'block';
        setTimeout(function () { t.style.display = 'none'; }, 2200);
      });
    }

  window.shareThisPage = shareThisPage;

  // ---- Route datasets ----
  var routeData = {

        '<div class="lg-row"><span class="dot" style="background:#2d6a4f;"></span><span class="en">Nature / mountains</span><span class="zh">自然/山景</span></div>',
      distRowsHtml:
        '<tr><td>A → B · <span class="en">Queenstown → Milford Sound</span><span class="zh">皇后镇 → 米尔福德峡湾</span></td><td>~288 km</td><td>~4 hr</td></tr>' +
        '<tr><td>B → C · <span class="en">Milford → Wanaka</span><span class="zh">米尔福德 → 瓦纳卡</span></td><td>~350 km</td><td>~5 hr</td></tr>' +
        '<tr><td>C → D · <span class="en">Wanaka → Franz Josef (Haast Pass)</span><span class="zh">瓦纳卡 → 弗朗兹约瑟夫（哈斯特山口）</span></td><td>~285 km</td><td>~4 hr</td></tr>' +
        '<tr><td>D → E · <span class="en">Franz Josef → Punakaiki</span><span class="zh">弗朗兹约瑟夫 → 普纳凯基</span></td><td>~245 km</td><td>~3.5 hr</td></tr>' +

      itinLabel: '<span class="en">📅 Your Planned Itinerary · 26 nights</span><span class="zh">📅 为你规划的行程 · 26晚</span>',
      stagesHtml:
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#e63b2e;">A</div><div><div class="stage-title"><span class="en">Queenstown &amp; Arrowtown</span><span class="zh">皇后镇与箭镇</span></div><div class="stage-dates">30 Sep – 4 Oct · 🛬 <span class="en">Land ZQN</span><span class="zh">皇后镇降落</span></div></div><div class="stage-nights">4 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Settle in at the adventure capital. Ride the Skyline Gondola, wander historic gold-mining Arrowtown, cruise Lake Wakatipu on the TSS Earnslaw, and drive out to Glenorchy. Pick up your one-way rental car here.</span><span class="zh">在冒险之都安顿下来。搭乘天际缆车，漫步淘金古镇箭镇，乘坐古董蒸汽船畅游瓦卡蒂普湖，并驱车前往格伦诺基。在此取单程租车。</span></div><div class="stage-tags"><span class="stage-tag">🚡 <span class="en">Skyline Gondola</span><span class="zh">天际缆车</span></span><span class="stage-tag">⛏️ <span class="en">Arrowtown</span><span class="zh">箭镇</span></span><span class="stage-tag">🍷 <span class="en">Wineries</span><span class="zh">酒庄</span></span><span class="stage-tag">🚗 <span class="en">Collect car</span><span class="zh">取车</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Queenstown%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">B</div><div><div class="stage-title"><span class="en">Te Anau &amp; Milford Sound</span><span class="zh">蒂阿瑙与米尔福德峡湾</span></div><div class="stage-dates">4 – 7 Oct · Fiordland</div></div><div class="stage-nights">3 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Base in Te Anau, gateway to Fiordland. The highlight: your ⭐ Milford Sound nature cruise — Mitre Peak, waterfalls and seals. Add the Te Anau glowworm caves and, if time allows, a quieter Doubtful Sound overnight.</span><span class="zh">以蒂阿瑙为基地，通往峡湾国家公园。重头戏：⭐ 米尔福德峡湾游船 —— 米特峰、瀑布与海豹。再加上蒂阿瑙萤火虫洞，若时间允许，可安排更宁静的神秘峡湾过夜游。</span></div><div class="stage-tags"><span class="stage-tag star">⭐ <span class="en">Milford Sound cruise</span><span class="zh">米尔福德峡湾游船</span></span><span class="stage-tag">✨ <span class="en">Glowworm caves</span><span class="zh">萤火虫洞</span></span><span class="stage-tag">🚢 <span class="en">Doubtful Sound</span><span class="zh">神秘峡湾</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Milford%20Sound%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#2d6a4f;">C</div><div><div class="stage-title"><span class="en">Wanaka</span><span class="zh">瓦纳卡</span></div><div class="stage-dates">7 – 10 Oct · Lake district</div></div><div class="stage-nights">3 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">A calmer lakeside town. Photograph #ThatWanakaTree, hike Roys Peak for the classic view, visit Puzzling World, and drive the Cardrona valley. Great cafés and Rippon vineyard by the lake.</span><span class="zh">更宁静的湖畔小镇。拍摄著名的“瓦纳卡树”，登罗伊峰饱览经典景色，参观迷宫世界，驱车卡德罗纳山谷。湖边有很棒的咖啡馆和里彭酒庄。</span></div><div class="stage-tags"><span class="stage-tag">🌳 <span class="en">#ThatWanakaTree</span><span class="zh">瓦纳卡树</span></span><span class="stage-tag">🥾 <span class="en">Roys Peak</span><span class="zh">罗伊峰</span></span><span class="stage-tag">🧩 <span class="en">Puzzling World</span><span class="zh">迷宫世界</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Wanaka%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#2d6a4f;">D</div><div><div class="stage-title"><span class="en">Franz Josef &amp; Fox Glaciers</span><span class="zh">弗朗兹约瑟夫与福克斯冰川</span></div><div class="stage-dates">10 – 13 Oct · West Coast · Haast Pass</div></div><div class="stage-nights">3 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Cross the scenic Haast Pass to glacier country. Walk to the glacier faces, take a heli-hike onto the ice, see the mirror reflections at Lake Matheson, and soak in the hot pools.</span><span class="zh">翻越风景优美的哈斯特山口，进入冰川之乡。步行至冰川脚下，乘直升机徒步登上冰面，欣赏马西森湖的镜面倒影，再泡泡温泉。</span></div><div class="stage-tags"><span class="stage-tag">🧊 <span class="en">Glacier walks</span><span class="zh">冰川徒步</span></span><span class="stage-tag">🚁 <span class="en">Heli-hike</span><span class="zh">直升机徒步</span></span><span class="stage-tag">🪞 <span class="en">Lake Matheson</span><span class="zh">马西森湖</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Franz%20Josef%20Glacier%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">E</div><div><div class="stage-title"><span class="en">Hokitika &amp; Punakaiki</span><span class="zh">霍基蒂卡与普纳凯基</span></div><div class="stage-dates">13 – 15 Oct · West Coast</div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Wild west coast. Marvel at the turquoise Hokitika Gorge, shop for greenstone (pounamu jade), and watch the sea explode through the Punakaiki Pancake Rocks &amp; blowholes at high tide.</span><span class="zh">狂野的西海岸。惊叹于霍基蒂卡峡谷的碧绿湖水，选购绿玉（普纳姆玉），在涨潮时观赏普纳凯基千层岩与喷水孔的海浪奇观。</span></div><div class="stage-tags"><span class="stage-tag">💎 <span class="en">Hokitika Gorge</span><span class="zh">霍基蒂卡峡谷</span></span><span class="stage-tag">🥞 <span class="en">Pancake Rocks</span><span class="zh">千层岩</span></span><span class="stage-tag">🌊 <span class="en">Blowholes</span><span class="zh">喷水孔</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Punakaiki%20Pancake%20Rocks%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#2d6a4f;">F</div><div><div class="stage-title"><span class="en">Arthur\'s Pass</span><span class="zh">亚瑟山口</span></div><div class="stage-dates">15 – 17 Oct · Alpine crossing</div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">The grandest alpine pass, straddling the Southern Alps. Short walks to Devils Punchbowl Falls, cheeky kea mountain parrots, and the famous TranzAlpine railway scenery through the mountains.</span><span class="zh">最壮丽的高山垭口，横跨南阿尔卑斯山。步行前往魔鬼酒杯瀑布，偶遇顽皮的高山鹦鹉“kea”，欣赏著名的高山观光火车穿越群山的美景。</span></div><div class="stage-tags"><span class="stage-tag">💧 <span class="en">Devils Punchbowl</span><span class="zh">魔鬼酒杯瀑布</span></span><span class="stage-tag">🦜 <span class="en">Kea parrots</span><span class="zh">高山鹦鹉</span></span><span class="stage-tag">🚂 <span class="en">TranzAlpine</span><span class="zh">高山火车</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Arthur%27s%20Pass%20National%20Park%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">G</div><div><div class="stage-title"><span class="en">Kaikōura</span><span class="zh">凯库拉</span></div><div class="stage-dates">17 – 19 Oct · Whale coast</div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Where mountains meet the sea. Go whale watching (resident sperm whales year-round), meet fur seal colonies and dusky dolphins, and feast on the crayfish the town is named for.</span><span class="zh">高山与大海相接之地。出海观鲸（常年可见抹香鲸），探访毛皮海豹群与暗色海豚，品尝这座以“小龙虾大餐”命名的小镇的招牌美食。</span></div><div class="stage-tags"><span class="stage-tag star">🐋 <span class="en">Whale watching</span><span class="zh">观鲸</span></span><span class="stage-tag">🦭 <span class="en">Seal colony</span><span class="zh">海豹群</span></span><span class="stage-tag">🦞 <span class="en">Crayfish</span><span class="zh">小龙虾</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Kaikoura%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#e63b2e;">H</div><div><div class="stage-title"><span class="en">Christchurch</span><span class="zh">基督城</span></div><div class="stage-dates">19 – 21 Oct · Garden City</div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">The elegant Garden City. Go punting on the Avon River, ride the heritage tram, stroll the Botanic Gardens, and see the creative post-earthquake rebuild and street art.</span><span class="zh">优雅的花园之城。在雅芳河上撑篙泛舟，乘坐古董电车，漫步植物园，感受震后充满创意的重建与街头艺术。</span></div><div class="stage-tags"><span class="stage-tag">🛶 <span class="en">Punting the Avon</span><span class="zh">雅芳河泛舟</span></span><span class="stage-tag">🚋 <span class="en">Heritage tram</span><span class="zh">古董电车</span></span><span class="stage-tag">🌷 <span class="en">Botanic Gardens</span><span class="zh">植物园</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Christchurch%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">I</div><div><div class="stage-title"><span class="en">Lake Tekapo</span><span class="zh">特卡波湖</span></div><div class="stage-dates">21 – 23 Oct · Dark Sky</div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Impossibly turquoise glacier-fed lake. Photograph the little Church of the Good Shepherd, ride up Mt John for the view, relax in the hot springs, and stargaze in this International Dark Sky Reserve.</span><span class="zh">碧蓝得不可思议的冰川湖。拍摄小巧的好牧羊人教堂，登上约翰山俯瞰美景，在温泉中放松，并在这片国际暗夜保护区里观星。</span></div><div class="stage-tags"><span class="stage-tag">⛪ <span class="en">Good Shepherd Church</span><span class="zh">好牧羊人教堂</span></span><span class="stage-tag">🔭 <span class="en">Mt John · stargazing</span><span class="zh">约翰山·观星</span></span><span class="stage-tag">♨️ <span class="en">Hot springs</span><span class="zh">温泉</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Lake%20Tekapo%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#2d6a4f;">J</div><div><div class="stage-title"><span class="en">Aoraki / Mount Cook</span><span class="zh">库克山</span></div><div class="stage-dates">23 – 26 Oct · NZ\'s highest peak</div></div><div class="stage-nights">3 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Finish among the giants. Walk the stunning Hooker Valley Track to the glacier lake beneath NZ\'s tallest mountain, take a Tasman Glacier boat tour among icebergs, and enjoy world-class dark skies.</span><span class="zh">在群峰之巅收尾。漫步壮丽的胡克山谷步道，走到新西兰最高峰脚下的冰川湖，参加塔斯曼冰川游船穿行于冰山之间，并欣赏世界级的暗夜星空。</span></div><div class="stage-tags"><span class="stage-tag star">🏔️ <span class="en">Hooker Valley Track</span><span class="zh">胡克山谷步道</span></span><span class="stage-tag">🛥️ <span class="en">Tasman Glacier</span><span class="zh">塔斯曼冰川</span></span><span class="stage-tag">🌌 <span class="en">Dark Sky stars</span><span class="zh">暗夜星空</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Aoraki%20Mount%20Cook%20National%20Park%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>',
      finishHtml: '<div class="finish"><div class="f-title">✈️ <span class="en">26 Oct → Fly Home</span><span class="zh">10月26日 → 回国</span></div><div class="f-sub"><span class="en">Drive Mt Cook → Christchurch (~4.5 hr) on 26 Oct, then Singapore Airlines SQ 296 departs Christchurch 01:05 on 27 Oct → home to Singapore 06:40.</span><span class="zh">10月26日自驾库克山 → 基督城（约4.5小时），然后搭乘新加坡航空 SQ 296，10月27日01:05从基督城起飞 → 06:40抵达新加坡。</span></div></div>',
      tipsLabel: '<span class="en">💡 Practical Tips</span><span class="zh">💡 实用贴士</span>',
      tipsHtml:
        '<div class="tip"><div class="t-ico">🚗</div><div><div class="t-title"><span class="en">One-way rental car</span><span class="zh">单程租车</span></div><div class="t-sub"><span class="en">Pick up in Queenstown, drop off in Christchurch. Book an open-jaw hire early — it saves days of backtracking.</span><span class="zh">在皇后镇取车，基督城还车。尽早预订异地还车，可省下好几天的回头路。</span></div></div></div>' +
        '<div class="tip"><div class="t-ico">🌸</div><div><div class="t-title"><span class="en">October = spring</span><span class="zh">十月＝春季</span></div><div class="t-sub"><span class="en">Snow-capped peaks, baby lambs, blossom and fewer crowds — but mountain weather is changeable. Pack layers and a warm jacket.</span><span class="zh">雪顶山峰、初生羊羔、繁花盛开、游人较少 —— 但山区天气多变，请备好多层衣物和保暖外套。</span></div></div></div>' +
        '<div class="tip"><div class="t-ico">🛣️</div><div><div class="t-title"><span class="en">Drive on the left · take it slow</span><span class="zh">靠左行驶·慢慢开</span></div><div class="t-sub"><span class="en">Roads are scenic but winding and often single-lane. Distances take longer than they look — plan generous drive times and stop often.</span><span class="zh">道路风景优美但弯多、常为单车道。实际车程比看起来更久 —— 请预留充裕时间，多多停车休息。</span></div></div></div>' +
        '<div class="tip"><div class="t-ico">📅</div><div><div class="t-title"><span class="en">Book Milford &amp; whales ahead</span><span class="zh">提前预订峡湾与观鲸</span></div><div class="t-sub"><span class="en">The Milford Sound cruise and Kaikōura whale watching sell out in peak season — reserve these two before you fly.</span><span class="zh">米尔福德峡湾游船和凯库拉观鲸在旺季常常售罄 —— 请在出发前订好这两项。</span></div></div></div>',

    south: {
      pageTitle: 'MT11: Deep South Loop · Southern Scenic Route · New Zealand 2026',
      heroTag: '<span class="en">MT11 · Option 2 · The Deep South</span><span class="zh">MT11 · 方案二 · 极南之地</span>',
      h1: '<span class="en">Deep South <span>Loop</span></span><span class="zh">极南 <span>环线</span></span>',
      heroSub: '<span class="en">Southern Scenic Route · Fiordland · Southland · Stewart Island · The Catlins · Otago</span><span class="zh">南部观景公路 · 峡湾 · 南地 · 斯图尔特岛 · 卡特林斯 · 奥塔哥</span>',
      statsHtml: '<div class="stat-pill"><div class="num">8</div><div class="lbl"><span class="en">Stops</span><span class="zh">站点</span></div></div>' +
        '<div class="stat-pill"><div class="num">~14</div><div class="lbl"><span class="en">Nights</span><span class="zh">晚</span></div></div>' +
        '<div class="stat-pill"><div class="num">🐧</div><div class="lbl"><span class="en">Wildlife</span><span class="zh">野生动物</span></div></div>' +
        '<div class="stat-pill"><div class="num">3</div><div class="lbl"><span class="en">Islands</span><span class="zh">岛屿</span></div></div>',
      mapLabel: '<span class="en">🗺️ Deep South Route Map</span><span class="zh">🗺️ 极南路线地图</span>',
      introHtml: '<span class="en">A focused loop through New Zealand\'s far south — the wildest, least-crowded corner. From Queenstown down the Southern Scenic Route to the very tip at Bluff, across to Stewart Island, then along the rugged Catlins coast to Dunedin. Penguins, sea lions, kiwi, fjords and lighthouses.</span><span class="zh">深入新西兰极南的专属环线 —— 最狂野、人最少的一角。从皇后镇沿南部观景公路南下，直抵最南端的布拉夫，渡海前往斯图尔特岛，再沿崎岖的卡特林斯海岸抵达但尼丁。企鹅、海狮、几维鸟、峡湾与灯塔。</span>',
      legendHtml: '<div class="lg-row"><span class="dot" style="background:#e63b2e;"></span><span class="en">Start / End</span><span class="zh">起点/终点</span></div>' +
        '<div class="lg-row"><span class="dot" style="background:#1b6ca8;"></span><span class="en">Coast / fjord / island</span><span class="zh">海岸/峡湾/岛屿</span></div>' +
        '<div class="lg-row"><span class="dot" style="background:#2d6a4f;"></span><span class="en">Nature / forest</span><span class="zh">自然/森林</span></div>' +
        '<div class="lg-row"><span style="display:inline-block;width:14px;border-top:2px dashed #1b6ca8;"></span><span class="en">Ferry</span><span class="zh">渡轮</span></div>',
      distRowsHtml:
        '<tr><td>A → B · <span class="en">Queenstown → Te Anau</span><span class="zh">皇后镇 → 蒂阿瑙</span></td><td>~170 km</td><td>~2 hr</td></tr>' +
        '<tr><td>B → C · <span class="en">Te Anau → Riverton (Scenic Rte)</span><span class="zh">蒂阿瑙 → 里弗顿（观景路）</span></td><td>~170 km</td><td>~2.5 hr</td></tr>' +
        '<tr><td>C → D · <span class="en">Riverton → Invercargill &amp; Bluff</span><span class="zh">里弗顿 → 因弗卡吉尔与布拉夫</span></td><td>~40 km</td><td>~0.5 hr</td></tr>' +
        '<tr><td>D → E · <span class="en">Bluff → Stewart Island (ferry)</span><span class="zh">布拉夫 → 斯图尔特岛（渡轮）</span></td><td>~30 km</td><td>~1 hr ⛴</td></tr>' +
        '<tr><td>E → F · <span class="en">Bluff → Curio Bay (Catlins)</span><span class="zh">布拉夫 → 库里奥湾（卡特林斯）</span></td><td>~160 km</td><td>~2 hr</td></tr>' +
        '<tr><td>F → G · <span class="en">Curio Bay → Nugget Point</span><span class="zh">库里奥湾 → 纳盖特角</span></td><td>~110 km</td><td>~1.5 hr</td></tr>' +
        '<tr><td>G → H · <span class="en">Nugget Point → Dunedin</span><span class="zh">纳盖特角 → 但尼丁</span></td><td>~110 km</td><td>~1.5 hr</td></tr>',
      distNoteHtml: '<span class="en">Distances &amp; times are typical real-road estimates (Stewart Island is a foot-passenger ferry from Bluff — leave the car). Not live traffic.</span><span class="zh">距离与时间为典型实际道路估算（斯图尔特岛为布拉夫出发的步行渡轮，需把车留在布拉夫）。非实时路况。</span>',
      itinLabel: '<span class="en">📅 Deep South Itinerary · ~14 nights</span><span class="zh">📅 极南行程 · 约14晚</span>',
      stagesHtml:
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#e63b2e;">A</div><div><div class="stage-title"><span class="en">Queenstown</span><span class="zh">皇后镇</span></div><div class="stage-dates">🛬 <span class="en">Start · collect car</span><span class="zh">起点·取车</span></div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Land, settle in and pick up the rental car. Gondola, Arrowtown and lakeside dinners before heading south.</span><span class="zh">降落、安顿并取租车。南下前先游天际缆车、箭镇，享受湖畔晚餐。</span></div><div class="stage-tags"><span class="stage-tag">🚡 <span class="en">Gondola</span><span class="zh">缆车</span></span><span class="stage-tag">🚗 <span class="en">Collect car</span><span class="zh">取车</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Queenstown%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">B</div><div><div class="stage-title"><span class="en">Te Anau · Fiordland</span><span class="zh">蒂阿瑙 · 峡湾</span></div><div class="stage-dates"><span class="en">Milford + Doubtful Sound</span><span class="zh">米尔福德＋神秘峡湾</span></div></div><div class="stage-nights">3 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Gateway to the fjords. Take the ⭐ Milford Sound cruise, plus the wilder overnight Doubtful Sound via Lake Manapouri, and the Te Anau glowworm caves.</span><span class="zh">通往峡湾的门户。乘坐⭐米尔福德峡湾游船，再经玛纳普里湖前往更原始的神秘峡湾过夜游，以及蒂阿瑙萤火虫洞。</span></div><div class="stage-tags"><span class="stage-tag star">⭐ <span class="en">Milford cruise</span><span class="zh">米尔福德游船</span></span><span class="stage-tag">🚢 <span class="en">Doubtful Sound</span><span class="zh">神秘峡湾</span></span><span class="stage-tag">✨ <span class="en">Glowworms</span><span class="zh">萤火虫</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Te%20Anau%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#2d6a4f;">C</div><div><div class="stage-title"><span class="en">Riverton &amp; Tuatapere</span><span class="zh">里弗顿与图阿塔佩雷</span></div><div class="stage-dates"><span class="en">Southern Scenic Route</span><span class="zh">南部观景公路</span></div></div><div class="stage-nights">1 <span class="en">night</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Drive the coast road through "the sausage capital" Tuatapere to seaside Riverton — quiet beaches, Colac Bay surf and fish &amp; chips by the water.</span><span class="zh">沿海岸公路穿过“香肠之都”图阿塔佩雷，抵达海边小镇里弗顿 —— 宁静海滩、科拉克湾冲浪，海边的炸鱼薯条。</span></div><div class="stage-tags"><span class="stage-tag">🏖️ <span class="en">Colac Bay</span><span class="zh">科拉克湾</span></span><span class="stage-tag">🌅 <span class="en">Coast drive</span><span class="zh">海岸自驾</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Riverton%2C%20Southland%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">D</div><div><div class="stage-title"><span class="en">Invercargill &amp; Bluff</span><span class="zh">因弗卡吉尔与布拉夫</span></div><div class="stage-dates"><span class="en">Southern tip · Stirling Point</span><span class="zh">最南端 · 斯特灵角</span></div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">NZ\'s southernmost city. See the Bill Richardson Transport World, then drive to Bluff for the famous Stirling Point signpost, fresh Bluff oysters and the very bottom of the South Island.</span><span class="zh">新西兰最南端城市。参观比尔·理查森交通世界博物馆，再驱车前往布拉夫，打卡著名的斯特灵角路标，品尝新鲜布拉夫生蚝，抵达南岛最南端。</span></div><div class="stage-tags"><span class="stage-tag star">📍 <span class="en">Stirling Point</span><span class="zh">斯特灵角</span></span><span class="stage-tag">🦪 <span class="en">Bluff oysters</span><span class="zh">布拉夫生蚝</span></span><span class="stage-tag">🚙 <span class="en">Transport World</span><span class="zh">交通世界</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Stirling%20Point%2C%20Bluff%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">E</div><div><div class="stage-title"><span class="en">Stewart Island · Rakiura</span><span class="zh">斯图尔特岛 · 拉基乌拉</span></div><div class="stage-dates">⛴ <span class="en">Ferry from Bluff</span><span class="zh">布拉夫渡轮前往</span></div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">NZ\'s third island, 85% national park. One of the best places to see wild kiwi at night, plus the bird sanctuary of Ulva Island and Aurora Australis (southern lights) if you\'re lucky.</span><span class="zh">新西兰第三大岛，85%为国家公园。夜间观赏野生几维鸟的最佳地点之一，还有乌尔瓦岛鸟类保护区，运气好还能看到南极光。</span></div><div class="stage-tags"><span class="stage-tag star">🥝 <span class="en">Wild kiwi</span><span class="zh">野生几维鸟</span></span><span class="stage-tag">🐦 <span class="en">Ulva Island</span><span class="zh">乌尔瓦岛</span></span><span class="stage-tag">🌌 <span class="en">Southern lights</span><span class="zh">南极光</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Stewart%20Island%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#1b6ca8;">F</div><div><div class="stage-title"><span class="en">Curio Bay · The Catlins</span><span class="zh">库里奥湾 · 卡特林斯</span></div><div class="stage-dates"><span class="en">Petrified forest coast</span><span class="zh">石化森林海岸</span></div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Back on the mainland, enter the rugged Catlins. Curio Bay has a 180-million-year-old petrified forest, rare yellow-eyed penguins at dusk, and Hector\'s dolphins in Porpoise Bay. Don\'t miss Cathedral Caves and Purakaunui Falls.</span><span class="zh">回到本岛，进入崎岖的卡特林斯。库里奥湾有1.8亿年的石化森林、黄昏时分罕见的黄眼企鹅，以及海豚湾的赫氏海豚。别错过大教堂洞穴和普拉考努伊瀑布。</span></div><div class="stage-tags"><span class="stage-tag star">🐧 <span class="en">Yellow-eyed penguins</span><span class="zh">黄眼企鹅</span></span><span class="stage-tag">🐬 <span class="en">Hector\'s dolphins</span><span class="zh">赫氏海豚</span></span><span class="stage-tag">🌲 <span class="en">Petrified forest</span><span class="zh">石化森林</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Curio%20Bay%2C%20The%20Catlins%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#2d6a4f;">G</div><div><div class="stage-title"><span class="en">Nugget Point</span><span class="zh">纳盖特角</span></div><div class="stage-dates"><span class="en">Catlins lighthouse</span><span class="zh">卡特林斯灯塔</span></div></div><div class="stage-nights">— <span class="en">day stop</span><span class="zh">途中景点</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">The iconic Catlins lighthouse on a headland with jagged sea "nuggets" below — sea lions, fur seals and seabirds. Nearby Roaring Bay has a penguin hide. A stunning stop on the way to Dunedin.</span><span class="zh">卡特林斯的标志性灯塔，矗立于海岬之上，下方是锯齿状的海中礁石 —— 海狮、毛皮海豹与海鸟。附近的咆哮湾设有企鹅观察点。前往但尼丁途中的绝美一站。</span></div><div class="stage-tags"><span class="stage-tag star">🗼 <span class="en">Lighthouse</span><span class="zh">灯塔</span></span><span class="stage-tag">🦭 <span class="en">Sea lions</span><span class="zh">海狮</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Nugget%20Point%20Lighthouse%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>' +
        '<div class="stage"><div class="stage-head"><div class="stage-badge" style="background:#e63b2e;">H</div><div><div class="stage-title"><span class="en">Dunedin &amp; Otago Peninsula</span><span class="zh">但尼丁与奥塔哥半岛</span></div><div class="stage-dates"><span class="en">Wildlife capital · loop end</span><span class="zh">野生动物之都 · 环线终点</span></div></div><div class="stage-nights">2 <span class="en">nights</span><span class="zh">晚</span></div></div><div class="stage-body"><div class="stage-desc"><span class="en">Scottish-flavoured Dunedin ends the loop. The Otago Peninsula is a wildlife haven — royal albatross colony, yellow-eyed &amp; little blue penguins, sea lions. See Larnach Castle, the historic railway station and steep Baldwin Street.</span><span class="zh">带有苏格兰风情的但尼丁为环线收尾。奥塔哥半岛是野生动物天堂 —— 皇家信天翁栖息地、黄眼与小蓝企鹅、海狮。参观拉纳克城堡、历史火车站和陡峭的鲍德温街。</span></div><div class="stage-tags"><span class="stage-tag star">🦅 <span class="en">Royal albatross</span><span class="zh">皇家信天翁</span></span><span class="stage-tag">🏰 <span class="en">Larnach Castle</span><span class="zh">拉纳克城堡</span></span><span class="stage-tag">🐧 <span class="en">Penguins</span><span class="zh">企鹅</span></span></div><a class="stage-map" href="https://www.google.com/maps/search/?api=1&query=Otago%20Peninsula%2C%20Dunedin%2C%20New%20Zealand" target="_blank">🗺️ <span class="en">Map</span><span class="zh">地图</span></a></div></div>',
      finishHtml: '<p class="dist-note" style="margin-top:14px;font-size:0.82rem;"><span class="en">From Dunedin you can carry on north up the east coast — Moeraki Boulders → Lake Tekapo → Aoraki/Mt Cook → Christchurch to fly home. Switch to the Middle route above for the rest of that plan.</span><span class="zh">从但尼丁可继续沿东海岸北上 —— 摩拉基大圆石 → 特卡波湖 → 库克山 → 基督城回国。切换至上方“中路”选项查看其余行程。</span></p>',
      tipsLabel: '<span class="en">💡 Deep South Tips</span><span class="zh">💡 极南贴士</span>',
      tipsHtml:
        '<div class="tip south-tip"><div class="t-ico">⛴</div><div><div class="t-title"><span class="en">Stewart Island = ferry, no car</span><span class="zh">斯图尔特岛＝渡轮，不带车</span></div><div class="t-sub"><span class="en">The ferry from Bluff is foot-passenger only — park the car at Bluff and travel light. Book ferry &amp; lodge ahead; it\'s small.</span><span class="zh">布拉夫的渡轮仅限步行乘客 —— 把车停在布拉夫、轻装前往。渡轮与住宿都要提前订，岛很小。</span></div></div></div>' +
        '<div class="tip south-tip"><div class="t-ico">🐧</div><div><div class="t-title"><span class="en">Keep your distance from wildlife</span><span class="zh">与野生动物保持距离</span></div><div class="t-sub"><span class="en">Yellow-eyed penguins and sea lions are rare and easily spooked — stay well back, stay quiet, no flash. Dawn/dusk are best.</span><span class="zh">黄眼企鹅和海狮稀有且易受惊 —— 请远远观看、保持安静、不用闪光灯。清晨与黄昏最佳。</span></div></div></div>' +
        '<div class="tip south-tip"><div class="t-ico">🌦️</div><div><div class="t-title"><span class="en">The south is wild &amp; changeable</span><span class="zh">南部狂野多变</span></div><div class="t-sub"><span class="en">Four seasons in a day, strong coastal wind. Pack warm, waterproof layers even in spring — and allow flexible days for weather.</span><span class="zh">一天四季、海风强劲。即使春天也要带保暖防水衣物 —— 并预留弹性天数应对天气。</span></div></div></div>',
      stops: [
        { letter:'A', name:'Queenstown', lat:-45.0312, lng:168.6626, color:'#e63b2e', role:'🛬 Start · collect car', wikiTitle:'Queenstown, New Zealand' },
        { letter:'B', name:'Te Anau', lat:-45.4145, lng:167.7180, color:'#1b6ca8', role:'⭐ Fiordland · Milford & Doubtful', wikiTitle:'Te Anau' },
        { letter:'C', name:'Riverton', lat:-46.3556, lng:168.0206, color:'#2d6a4f', role:'Southern Scenic coast', wikiTitle:'Riverton, New Zealand' },
        { letter:'D', name:'Invercargill & Bluff', lat:-46.4132, lng:168.3538, color:'#1b6ca8', role:'Southernmost city', wikiTitle:'Invercargill' },
        { letter:'E', name:'Stewart Island · Rakiura', lat:-46.8969, lng:168.1258, color:'#1b6ca8', role:'⛴ Wild kiwi island', wikiTitle:'Stewart Island' },
        { letter:'F', name:'Curio Bay · Catlins', lat:-46.6606, lng:169.1030, color:'#1b6ca8', role:'🐧 Penguins & petrified forest', wikiTitle:'Curio Bay' },
        { letter:'G', name:'Nugget Point', lat:-46.4497, lng:169.8144, color:'#2d6a4f', role:'Catlins lighthouse', wikiTitle:'Nugget Point' },
        { letter:'H', name:'Dunedin', lat:-45.8788, lng:170.5028, color:'#e63b2e', role:'🦅 Otago wildlife · loop end', wikiTitle:'Dunedin' }
      ],
      polylines: [
        { pts:[[-45.0312,168.6626],[-45.4145,167.7180],[-46.3556,168.0206],[-46.4132,168.3538],[-46.6116,168.3376],[-46.6606,169.1030],[-46.4497,169.8144],[-45.8788,170.5028]], color:'#f4813f', dash:'9,9' },

  // ---- Map setup (single instance, swapped per route) ----
  var nzMap = L.map('nzMap', { scrollWheelZoom:false });
  var nzTiles = {
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:18 }),
    street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap contributors', maxZoom:19 })
  };
  nzTiles.street.addTo(nzMap);
  var nzCurrentTile = 'street';
  function setNzMapType(type){
    if (type === nzCurrentTile) return;
    nzMap.removeLayer(nzTiles[nzCurrentTile]);
    nzTiles[type].addTo(nzMap);
    nzCurrentTile = type;
    var sat = document.getElementById('nz-btn-satellite'), st = document.getElementById('nz-btn-street');
    if (type === 'satellite'){ sat.style.background='#c9933a';sat.style.color='#fff';sat.style.border='none';st.style.background='rgba(255,255,255,0.85)';st.style.color='#1a2e1a';st.style.border='1px solid rgba(0,0,0,0.15)'; }
    else { st.style.background='#c9933a';st.style.color='#fff';st.style.border='none';sat.style.background='rgba(255,255,255,0.85)';sat.style.color='#1a2e1a';sat.style.border='1px solid rgba(0,0,0,0.15)'; }
  }
  window.setNzMapType = setNzMapType;

  function nzIcon(color, letter){
    return L.divIcon({ className:'', html:'<div style="background:'+color+';width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.85rem;font-family:monospace;">'+letter+'</div>', iconSize:[28,28], iconAnchor:[14,14] });
  }
  function nzPopup(s){
    var img = s.img ? '<img src="'+s.img+'" style="width:100%;max-width:190px;border-radius:8px;margin-bottom:6px;display:block;">' : '';
    return '<div style="min-width:150px;">'+img+'<b>'+s.letter+' · '+s.name+'</b><br><span style="color:#555;font-size:0.85em;">'+s.role+'</span></div>';
  }

  var routeLayer = L.layerGroup().addTo(nzMap);
  var nzLatLngs = [];

  if (L.control.fullscreen){ nzMap.addControl(new L.Control.FullScreen({ position:'topleft' })); }
  function openNzFull(){ document.getElementById('nzMapWrap').classList.add('fs'); setTimeout(function(){ nzMap.invalidateSize(); nzMap.fitBounds(nzLatLngs,{padding:[60,60]}); },60); }
  function closeNzFull(){ document.getElementById('nzMapWrap').classList.remove('fs'); setTimeout(function(){ nzMap.invalidateSize(); nzMap.fitBounds(nzLatLngs,{padding:[40,40]}); },60); }
  window.openNzFull = openNzFull; window.closeNzFull = closeNzFull;

  function renderRoute(key){
    var d = routeData[key];
    if (!d) return;

    document.getElementById('rt-mid').classList.toggle('active', key==='middle');
    document.getElementById('rt-south').classList.toggle('active', key==='south');

    document.getElementById('heroSection').className = 'hero ' + (key==='middle' ? 'mid' : 'south');
    document.getElementById('heroTag').innerHTML = d.heroTag;
    document.getElementById('heroH1').innerHTML = d.h1;
    document.getElementById('heroSub').innerHTML = d.heroSub;
    document.getElementById('heroStats').innerHTML = d.statsHtml;

    document.getElementById('mapLabel').innerHTML = d.mapLabel;
    document.getElementById('mapIntro').innerHTML = d.introHtml;
    document.getElementById('mapLegend').innerHTML = d.legendHtml;

    document.getElementById('distBody').innerHTML = d.distRowsHtml;
    document.getElementById('distNote').innerHTML = d.distNoteHtml;

    document.getElementById('itinLabel').innerHTML = d.itinLabel;
    document.getElementById('stagesWrap').innerHTML = d.stagesHtml;
    document.getElementById('finishArea').innerHTML = d.finishHtml;

    document.getElementById('tipsLabel').innerHTML = d.tipsLabel;
    document.getElementById('tipsWrap').innerHTML = d.tipsHtml;

    document.title = d.pageTitle;
    document.getElementById('pageTitleTag').textContent = d.pageTitle;

    routeLayer.clearLayers();
    nzLatLngs = [];
    d.stops.forEach(function(s){
      nzLatLngs.push([s.lat, s.lng]);
      s.marker = L.marker([s.lat, s.lng], { icon:nzIcon(s.color, s.letter) }).addTo(routeLayer).bindPopup(nzPopup(s));
      if (s.wikiTitle && !s.img){
        fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(s.wikiTitle))
          .then(function(r){ return r.json(); })
          .then(function(wd){ if (wd && wd.thumbnail && wd.thumbnail.source){ s.img = wd.thumbnail.source; if (s.marker) s.marker.setPopupContent(nzPopup(s)); } })
          .catch(function(){});
      }
    });
    d.polylines.forEach(function(line){
      L.polyline(line.pts, { color: line.color, weight:3, dashArray: line.dash }).addTo(routeLayer);
    });
    nzMap.fitBounds(nzLatLngs, { padding:[40,40] });

    try { localStorage.setItem('mt11-route', key); } catch(e){}
  }
  window.renderRoute = renderRoute;

  // ---- Pick initial route: URL param > saved preference > default ----
  var initial = 'middle';
  try {
    var urlRoute = new URLSearchParams(window.location.search).get('route');
    if (urlRoute === 'south' || urlRoute === 'middle') { initial = urlRoute; }
    else {
      var saved = localStorage.getItem('mt11-route');
      if (saved === 'south' || saved === 'middle') { initial = saved; }
    }
  } catch(e){}
  renderRoute(initial);
</script>

<script src="/sw-register.js" defer></script>
</body>
