<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📌 Paul's Task List</title>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --card: #ffffff;
      --accent: #f4813f;
      --accent2: #1a1a2e;
      --high: #e53e3e;
      --med: #d97706;
      --low: #38a169;
      --done-bg: #f0fdf4;
      --done-text: #86a78a;
      --border: #e8e4de;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: #1a1a2e;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      color: white;
      padding: 28px 20px 24px;
      text-align: center;
      position: relative;
    }
    .home-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      color: white;
      text-decoration: none;
      font-size: 0.85em;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .home-btn:hover { background: rgba(255,255,255,0.25); }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9em;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 0.9em;
      opacity: 0.75;
      font-weight: 300;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      background: white;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .stat-item {
      flex: 1;
      max-width: 120px;
      text-align: center;
      padding: 12px 8px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-size: 1.6em;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.72em;
      color: #888;
      font-weight: 500;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── MAIN CONTAINER ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    /* ── ADD TASK FORM ── */
    .add-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .add-card h3 {
      font-size: 0.9em;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .task-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1em;
      color: #1a1a2e;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    .task-input:focus { border-color: var(--accent); background: white; }
    .priority-select {
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9em;
      font-weight: 600;
      color: #1a1a2e;
      background: #fafafa;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .priority-select:focus { border-color: var(--accent); }
    .add-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.3px;
    }
    .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(244,129,63,0.4); }
    .add-btn:active { transform: translateY(0); }

    /* ── FILTER TABS ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85em;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--accent2);
      color: white;
      border-color: var(--accent2);
    }
    .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ── TASK LIST ── */
    .section-label {
      font-size: 0.8em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #aaa;
      margin: 18px 0 10px;
      padding-left: 4px;
    }

    .task-item {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .task-item.done { background: var(--done-bg); border-color: #c6f6d5; border-left-color: var(--low); }
    .task-item.priority-high { border-left-color: var(--high); }
    .task-item.priority-med  { border-left-color: var(--med); }
    .task-item.priority-low  { border-left-color: var(--low); }

    .task-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #ccc;
      flex-shrink: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      background: white;
    }
    .task-check:hover { border-color: var(--low); }
    .task-item.done .task-check {
      background: var(--low);
      border-color: var(--low);
      color: white;
    }
    .task-check::after { content: ''; }
    .task-item.done .task-check::after { content: '✓'; font-size: 13px; font-weight: 700; color: white; }

    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 1em;
      font-weight: 500;
      color: #1a1a2e;
      line-height: 1.4;
      word-break: break-word;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-text);
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .priority-badge {
      font-size: 0.72em;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-high { background: #fff5f5; color: var(--high); }
    .badge-med  { background: #fffbeb; color: var(--med); }
    .badge-low  { background: #f0fff4; color: var(--low); }
    .task-date  { font-size: 0.75em; color: #bbb; font-weight: 400; }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1em;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--high); background: #fff5f5; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
    }
    .empty .emoji { font-size: 2.5em; margin-bottom: 10px; }
    .empty p { font-size: 0.95em; }

    /* ── CLEAR DONE BTN ── */
    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: white;
      border: 2px dashed #ddd;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9em;
      font-weight: 600;
      color: #aaa;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--high); color: var(--high); background: #fff5f5; }

    /* ── VIEW COUNTER ── */
    .view-counter-wrap { text-align: center; margin-top: 20px; }

    footer {
      text-align: center;
      font-size: 0.82em;
      color: #bbb;
      padding: 16px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <a target="_blank" href="https://paulsworld.netlify.app" class="home-btn">🏠 Home</a>
    <h1>📌 Paul's Task List</h1>
    <p>Stay organised · Get things done</p>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Done</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-high">0</div><div class="stat-label">🔴 High</div></div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- ADD TASK -->
    <div class="add-card">
      <h3>➕ Add New Task</h3>
      <div class="input-row">
        <input class="task-input" id="taskInput" type="text" placeholder="What do you need to do?" maxlength="200">
        <select class="priority-select" id="prioritySelect">
          <option value="high">🔴 High</option>
          <option value="med" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">⏳ Pending</button>
      <button class="filter-btn" onclick="setFilter('done', this)">✅ Done</button>
      <button class="filter-btn" onclick="setFilter('high', this)">🔴 High Priority</button>
    </div>

    <!-- TASK LIST -->
    <div id="taskList"></div>

    <!-- CLEAR DONE -->
    <button class="clear-btn" onclick="clearDone()">🗑️ Clear All Completed Tasks</button>

  </div>

  <div class="view-counter-wrap">
    <script src="/view-counter.js"></script>
  </div>

  <footer>&copy; 2025 Paul Yeo &nbsp;|&nbsp; Built with AI 🚀</footer>

  <script>
    let tasks = [];
    let currentFilter = 'all';

    // Load from localStorage
    function loadTasks() {
      const saved = localStorage.getItem('paulTaskList');
      if (saved) tasks = JSON.parse(saved);
    }

    // Save to localStorage
    function saveTasks() {
      localStorage.setItem('paulTaskList', JSON.stringify(tasks));
    }

    function formatDate() {
      return new Date().toLocaleDateString('en-SG', { day:'numeric', month:'short', year:'numeric' });
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const priority = document.getElementById('prioritySelect').value;
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      tasks.unshift({
        id: Date.now(),
        text,
        priority,
        done: false,
        date: formatDate()
      });

      saveTasks();
      input.value = '';
      input.focus();
      render();
    }

    function toggleDone(id) {
      const task = tasks.find(t => t.id === id);
      if (task) { task.done = !task.done; saveTasks(); render(); }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
    }

    function clearDone() {
      if (!tasks.some(t => t.done)) return;
      if (confirm('Delete all completed tasks?')) {
        tasks = tasks.filter(t => !t.done);
        saveTasks();
        render();
      }
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function updateStats() {
      const total   = tasks.length;
      const done    = tasks.filter(t => t.done).length;
      const pending = total - done;
      const high    = tasks.filter(t => t.priority === 'high' && !t.done).length;
      document.getElementById('stat-total').textContent   = total;
      document.getElementById('stat-done').textContent    = done;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-high').textContent    = high;
    }

    function render() {
      updateStats();
      const list = document.getElementById('taskList');

      let filtered = tasks;
      if (currentFilter === 'pending') filtered = tasks.filter(t => !t.done);
      if (currentFilter === 'done')    filtered = tasks.filter(t =>  t.done);
      if (currentFilter === 'high')    filtered = tasks.filter(t => t.priority === 'high' && !t.done);

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="emoji">✅</div>
            <p>${currentFilter === 'done' ? 'No completed tasks yet.' : 'No tasks here. Add one above!'}</p>
          </div>`;
        return;
      }

      // Split pending / done
      const pending = filtered.filter(t => !t.done);
      const done    = filtered.filter(t =>  t.done);

      let html = '';

      if (pending.length > 0) {
        if (currentFilter === 'all') html += `<div class="section-label">⏳ Pending (${pending.length})</div>`;
        pending.forEach(t => { html += taskHTML(t); });
      }

      if (done.length > 0) {
        if (currentFilter === 'all' || currentFilter === 'done')
          html += `<div class="section-label">✅ Completed (${done.length})</div>`;
        done.forEach(t => { html += taskHTML(t); });
      }

      list.innerHTML = html;
    }

    function taskHTML(t) {
      const badgeClass = { high:'badge-high', med:'badge-med', low:'badge-low' }[t.priority];
      const badgeLabel = { high:'🔴 High', med:'🟡 Medium', low:'🟢 Low' }[t.priority];
      return `
        <div class="task-item ${t.done ? 'done' : ''} priority-${t.priority}">
          <div class="task-check" onclick="toggleDone(${t.id})"></div>
          <div class="task-body">
            <div class="task-text">${t.text}</div>
            <div class="task-meta">
              <span class="priority-badge ${badgeClass}">${badgeLabel}</span>
              <span class="task-date">${t.date}</span>
            </div>
          </div>
          <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">🗑</button>
        </div>`;
    }

    // Enter key to add
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // Init
    loadTasks();
    render();
  </script>

<script src="/sw-register.js" defer></script>
</body>
</html>
