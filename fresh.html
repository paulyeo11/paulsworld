<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Home-screen icon (same as the site) -->
  <link rel="apple-touch-icon" href="/friends-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/friends-icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Paul's World">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Paul's World — Loading the latest…</title>
  <style>
    html,body{height:100%;margin:0;}
    body{display:flex;align-items:center;justify-content:center;flex-direction:column;
      font-family:'Segoe UI',Arial,sans-serif;background:#0e1330;color:#fff;text-align:center;}
    .spin{width:46px;height:46px;border:4px solid rgba(255,255,255,.25);border-top-color:#f4813f;
      border-radius:50%;animation:s 0.9s linear infinite;margin-bottom:18px;}
    @keyframes s{to{transform:rotate(360deg);}}
    p{opacity:.8;font-size:.95rem;letter-spacing:.04em;}
  </style>
  <script>
    // Force a brand-new load of the homepage every time (bypasses any cached copy)
    location.replace('/?fresh=' + Date.now());
  </script>
</head>
<body>
  <div class="spin"></div>
  <p>Loading the latest Paul's World…</p>
<script src="/sw-register.js" defer></script>
</body>
</html>
