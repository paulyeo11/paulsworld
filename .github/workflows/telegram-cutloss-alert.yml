name: Cut-loss Telegram Alert

on:
  schedule:
    - cron: '0 * * * 1-5'  # top of every hour, Mon-Fri (UTC)
  workflow_dispatch:
    inputs:
      force_test_message:
        description: 'Send a test Telegram message regardless of price breaches'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check prices and alert via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_TEST_MESSAGE: ${{ inputs.force_test_message }}
        run: node scripts/telegram-cutloss-alert.js
      - name: Commit updated alert state (if changed)
        run: |
          if ! git diff --quiet -- cutloss-alert-state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add cutloss-alert-state.json
            git commit -m "Update cut-loss alert state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
