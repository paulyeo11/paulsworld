<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <script src="/ga4.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Briefing – Paul's World</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(160deg,#0a0e1a 0%,#0d1520 40%,#0a1015 100%);min-height:100vh;color:#e8e8e8;font-family:'Lato',sans-serif;}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:#0a0e1a;}
    ::-webkit-scrollbar-thumb{background:#2a3a4a;border-radius:3px;}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:0.6;}50%{opacity:1;}}

    .home-btn{position:fixed;top:16px;left:16px;background:#3b82f6;color:#fff;text-decoration:none;padding:8px 18px;border-radius:6px;font-size:0.8rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;z-index:999;box-shadow:0 0 16px rgba(59,130,246,0.4);}

    .header{background:linear-gradient(135deg,#0d1a2e,#0a1520);border-bottom:1px solid rgba(99,179,237,0.15);padding:24px 20px 20px;position:sticky;top:0;z-index:10;}
    .header-inner{max-width:680px;margin:0 auto;}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10;flex-wrap:wrap;}
    .header-left{padding-left:90px;}
    .greeting-label{font-size:0.72rem;color:#63b3ed;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;}
    .header h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,1.9rem);color:#fff;line-height:1.2;}
    .date-str{font-size:0.8rem;color:#7a9bb5;margin-top:5px;}

    .refresh-btn{background:rgba(99,179,237,0.15);border:1px solid rgba(99,179,237,0.3);color:#63b3ed;border-radius:10px;padding:8px 16px;font-size:0.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Lato',sans-serif;margin-top:8px;transition:all 0.2s;}
    .refresh-btn:hover{background:rgba(99,179,237,0.25);}
    .refresh-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .spin{animation:spin 1s linear infinite;display:inline-block;}

    .ai-bar{margin-top:14px;padding:12px 16px;background:rgba(99,179,237,0.06);border:1px solid rgba(99,179,237,0.18);border-radius:10px;font-size:0.85rem;color:#c5dff0;line-height:1.6;animation:fadeIn 0.5s ease;}
    .ai-label{color:#63b3ed;font-weight:700;}
    .ai-loading{animation:pulse 1.5s ease infinite;}

    .container{max-width:680px;margin:20px auto 0;padding:0 16px 40px;}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
    .stat-card{border-radius:12px;padding:14px 12px;text-align:center;}
    .stat-icon{font-size:22px;margin-bottom:4px;}
    .stat-num{font-family:'Playfair Display',serif;font-size:1.6rem;line-height:1;}
    .stat-label{font-size:0.68rem;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;}

    .section{background:rgba(255,255,255,0.03);border-radius:16px;overflow:hidden;margin-bottom:20px;animation:fadeIn 0.4s ease;}
    .section-head{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
    .section-head-left{display:flex;align-items:center;gap:10px;}
    .section-icon{font-size:20px;}
    .section-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:#f0f0f0;font-weight:700;}
    .section-count{border-radius:20px;padding:2px 10px;font-size:0.72rem;font-weight:700;letter-spacing:0.05em;color:#fff;}
    .section-body{padding:16px 20px;}

    .loading-msg{display:flex;align-items:center;gap:10px;color:#888;font-size:0.85rem;}
    .error-msg{color:#ef4444;font-size:0.82rem;padding:8px 12px;background:#ef444411;border-radius:8px;}
    .empty-msg{color:#666;font-size:0.85rem;text-align:center;padding:12px 0;}

    .event-card{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);margin-bottom:8px;transition:background 0.2s;cursor:default;}
    .event-card:hover{background:rgba(255,255,255,0.07);}
    .event-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
    .event-body{flex:1;min-width:0;}
    .event-title{font-weight:600;color:#f0f0f0;font-size:0.9rem;margin-bottom:3px;}
    .event-time{font-size:0.78rem;font-weight:500;}
    .event-date{font-size:0.75rem;color:#999;margin-top:2px;}
    .event-desc{font-size:0.78rem;color:#aaa;margin-top:4px;line-height:1.5;}
    .event-from{font-size:0.75rem;color:#888;margin-top:3px;}
    .priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}

    .urgent-label{font-size:0.7rem;color:#ef4444;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}

    footer{text-align:center;padding:24px 16px;border-top:1px solid rgba(255,255,255,0.06);color:#444;font-size:0.78rem;margin-top:8px;}
    .last-refresh{text-align:center;margin-top:16px;color:#444;font-size:0.75rem;}
  </style>
</head>
<body>

<a href="https://paulsworld.vercel.app/" class="home-btn">🏠 Home</a>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-left">
        <div class="greeting-label" id="greeting">🌅 Good Morning, Paul</div>
        <h1>Daily Briefing</h1>
        <div class="date-str" id="dateStr"></div>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
        <span id="refreshIcon">⟳</span>
        <span id="refreshText">Refresh</span>
      </button>
    </div>
    <div class="ai-bar" id="aiBar" style="display:none"></div>
  </div>
</div>

<div class="container">

  <div class="stats">
    <div class="stat-card" id="statCal" style="background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.2)">
      <div class="stat-icon">📅</div>
      <div class="stat-num" style="color:#63b3ed" id="statCalNum">—</div>
      <div class="stat-label">Today's Events</div>
    </div>
    <div class="stat-card" id="statEmail" style="background:rgba(246,173,85,0.08);border:1px solid rgba(246,173,85,0.2)">
      <div class="stat-icon">📧</div>
      <div class="stat-num" style="color:#f6ad55" id="statEmailNum">—</div>
      <div class="stat-label">Action Emails</div>
    </div>
    <div class="stat-card" id="statRem" style="background:rgba(104,211,145,0.08);border:1px solid rgba(104,211,145,0.2)">
      <div class="stat-icon">🔔</div>
      <div class="stat-num" style="color:#68d391" id="statRemNum">—</div>
      <div class="stat-label">Reminders</div>
    </div>
  </div>

  <div id="sections"></div>

  <div class="last-refresh" id="lastRefresh"></div>
</div>

<footer>
  Paul's World · Daily Briefing · Powered by AI
  <div style="margin-top:10px"><script src="/view-counter.js"></script></div>
</footer>

<script>
const TODAY = new Date();
const TODAY_ISO = TODAY.toISOString().split('T')[0];
const WEEK_ISO = new Date(TODAY.getTime() + 7*24*60*60*1000).toISOString().split('T')[0];
const DATE_STR = TODAY.toLocaleDateString('en-SG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const HOUR = TODAY.getHours();
const GREETING = HOUR < 12 ? 'Morning' : HOUR < 17 ? 'Afternoon' : 'Evening';

document.getElementById('greeting').textContent = `🌅 Good ${GREETING}, Paul`;
document.getElementById('dateStr').textContent = DATE_STR;

const MCP_SERVERS = [
  {type:'url', url:'https://gmailmcp.googleapis.com/mcp/v1', name:'gmail-mcp'},
  {type:'url', url:'https://calendarmcp.googleapis.com/mcp/v1', name:'calendar-mcp'},
];

async function callClaude(prompt, system) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system: system || 'You are a personal assistant for Paul, a 70-year-old retired man. Always respond with valid JSON array only. No markdown, no explanation, no preamble.',
      messages:[{role:'user', content:prompt}],
      mcp_servers: MCP_SERVERS,
    })
  });
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
}

function safeJSON(text) {
  try {
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}

function catIcon(cat) {
  const m={medical:'🏥',meeting:'🤝',travel:'✈️',personal:'👤',finance:'💰',social:'🎉',exercise:'💪',reminder:'🔔',email:'📧'};
  return m[(cat||'').toLowerCase()] || '📌';
}

function prioColor(p) {
  return p==='high'?'#ef4444':p==='medium'?'#f59e0b':'#4b5563';
}

function makeEventCard(item, accent) {
  return `
    <div class="event-card">
      <span class="event-icon">${catIcon(item.category)}</span>
      <div class="event-body">
        <div class="event-title">${item.title||'Untitled'}</div>
        ${item.time?`<div class="event-time" style="color:${accent}">🕐 ${item.time}</div>`:''}
        ${item.date&&item.date!==TODAY_ISO&&item.date!=='Today'?`<div class="event-date">📅 ${item.date}</div>`:''}
        ${item.description?`<div class="event-desc">${item.description}</div>`:''}
        ${item.from?`<div class="event-from">From: ${item.from}</div>`:''}
      </div>
      ${item.priority?`<div class="priority-dot" style="background:${prioColor(item.priority)};box-shadow:0 0 6px ${prioColor(item.priority)}" title="${item.priority} priority"></div>`:''}
    </div>`;
}

function makeSection(title, icon, color, id) {
  return `
    <div class="section" id="sec-${id}">
      <div class="section-head" style="background:linear-gradient(135deg,${color}18,${color}08);border-bottom:1px solid ${color}22">
        <div class="section-head-left">
          <span class="section-icon">${icon}</span>
          <span class="section-title">${title}</span>
        </div>
        <span class="section-count" id="cnt-${id}" style="background:${color}"></span>
      </div>
      <div class="section-body" id="body-${id}">
        <div class="loading-msg"><span class="spin">⟳</span> Loading…</div>
      </div>
    </div>`;
}

function setSection(id, count, html) {
  const cnt = document.getElementById('cnt-'+id);
  const body = document.getElementById('body-'+id);
  if (cnt) cnt.textContent = count;
  if (body) body.innerHTML = html;
}

async function loadCalendar() {
  try {
    const raw = await callClaude(
      `List all my calendar events from today ${TODAY_ISO} to ${WEEK_ISO}. Return a JSON array. Each item must have: title (string), date (YYYY-MM-DD), time (string like "10:00 AM" or "All day"), description (string, 1 sentence), category (one of: medical meeting travel personal finance social exercise reminder), priority (high medium low). Return ONLY the JSON array, nothing else.`
    );
    const all = safeJSON(raw);
    const todayEvts = all.filter(e => !e.date || e.date === TODAY_ISO || e.date === 'Today');
    const upcoming = all.filter(e => e.date && e.date !== TODAY_ISO && e.date !== 'Today');

    document.getElementById('statCalNum').textContent = todayEvts.length;

    if (todayEvts.length === 0) {
      setSection('cal', todayEvts.length, '<div class="empty-msg">✨ No events today — enjoy your free day!</div>');
    } else {
      setSection('cal', todayEvts.length, todayEvts.map(e => makeEventCard(e,'#63b3ed')).join(''));
    }

    if (upcoming.length > 0) {
      document.getElementById('sec-upcoming').style.display = '';
      setSection('upcoming', upcoming.length, upcoming.map(e => makeEventCard(e,'#7f9cf5')).join(''));
    }
    return all;
  } catch(e) {
    setSection('cal', '!', '<div class="error-msg">⚠️ Could not load calendar. Ensure Google Calendar is connected.</div>');
    document.getElementById('statCalNum').textContent = '!';
    return [];
  }
}

async function loadEmails() {
  try {
    const raw = await callClaude(
      `Search my Gmail for up to 8 important unread emails from the last 3 days that need action, or relate to appointments or reminders. Return a JSON array. Each item must have: title (subject line), from (sender name), date (YYYY-MM-DD), time (received time), description (1 sentence: what action is needed), priority (high medium low), category (one of: medical meeting finance social personal reminder). Return ONLY the JSON array, nothing else.`
    );
    const emails = safeJSON(raw);
    const urgent = emails.filter(e => e.priority === 'high');
    const others = emails.filter(e => e.priority !== 'high');

    document.getElementById('statEmailNum').textContent = emails.length;

    if (emails.length === 0) {
      setSection('email', 0, '<div class="empty-msg">✅ Inbox clear — no action needed!</div>');
    } else {
      let html = '';
      if (urgent.length > 0) html += `<div class="urgent-label">🔴 Urgent</div>${urgent.map(e=>makeEventCard(e,'#ef4444')).join('')}`;
      html += others.map(e => makeEventCard(e,'#f6ad55')).join('');
      setSection('email', emails.length, html);
    }
    return emails;
  } catch(e) {
    setSection('email', '!', '<div class="error-msg">⚠️ Could not load Gmail. Ensure Gmail is connected.</div>');
    document.getElementById('statEmailNum').textContent = '!';
    return [];
  }
}

async function loadReminders() {
  try {
    const raw = await callClaude(
      `List all my reminders and to-do items due today ${TODAY_ISO} or this week up to ${WEEK_ISO} from my Google Calendar reminders. Return a JSON array. Each item must have: title (string), date (YYYY-MM-DD or "Today" or "Tomorrow"), time (string or ""), description (string), priority (high medium low), category (one of: medical meeting finance social personal exercise reminder). Return ONLY the JSON array, nothing else.`,
      'You are a personal assistant checking reminders and to-do items. Return only a valid JSON array.'
    );
    const all = safeJSON(raw);
    const todayRem = all.filter(r => !r.date || r.date === TODAY_ISO || r.date === 'Today');
    const upcoming = all.filter(r => r.date && r.date !== TODAY_ISO && r.date !== 'Today');

    document.getElementById('statRemNum').textContent = all.length;

    if (todayRem.length === 0) {
      setSection('reminder', 0, '<div class="empty-msg">✅ No reminders due today</div>');
    } else {
      setSection('reminder', todayRem.length, todayRem.map(r => makeEventCard(r,'#68d391')).join(''));
    }

    if (upcoming.length > 0) {
      document.getElementById('sec-upcoming-rem').style.display = '';
      setSection('upcoming-rem', upcoming.length, upcoming.map(r => makeEventCard(r,'#b794f4')).join(''));
    }
    return all;
  } catch(e) {
    setSection('reminder', '!', '<div class="error-msg">⚠️ Could not load reminders.</div>');
    document.getElementById('statRemNum').textContent = '!';
    return [];
  }
}

async function loadAI(cal, emails, reminders) {
  const aiBar = document.getElementById('aiBar');
  aiBar.style.display = '';
  aiBar.innerHTML = '<span class="ai-loading">🤖 Preparing your briefing…</span>';
  try {
    const ctx = `Calendar: ${JSON.stringify(cal)}. Emails: ${JSON.stringify(emails)}. Reminders: ${JSON.stringify(reminders)}.`;
    const raw = await callClaude(
      `Based on Paul's data today (${DATE_STR}): ${ctx}. Write a friendly 2-3 sentence morning briefing for Paul — summarise his day, highlight urgent items, add a warm encouraging note. Plain text only.`,
      "You are Paul's personal assistant. Write a warm personal morning briefing in plain text. No JSON, no markdown."
    );
    aiBar.innerHTML = `<span class="ai-label">🤖 AI: </span>${raw.trim()}`;
  } catch {
    aiBar.innerHTML = '<span class="ai-label">🤖 AI: </span>Good day, Paul! Check your events and emails above.';
  }
}

async function loadAll() {
  // Setup sections HTML
  document.getElementById('sections').innerHTML =
    makeSection("Today's Calendar","📅","#63b3ed","cal") +
    makeSection("Upcoming This Week","🗓️","#7f9cf5","upcoming") +
    makeSection("Emails Needing Attention","📧","#f6ad55","email") +
    makeSection("Today's Reminders & To-Do","🔔","#68d391","reminder") +
    makeSection("Upcoming Reminders","📋","#b794f4","upcoming-rem");

  // Hide upcoming sections initially
  document.getElementById('sec-upcoming').style.display = 'none';
  document.getElementById('sec-upcoming-rem').style.display = 'none';

  // Spinner
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  const txt = document.getElementById('refreshText');
  btn.disabled = true;
  icon.className = 'spin';
  txt.textContent = 'Loading…';

  document.getElementById('statCalNum').textContent = '…';
  document.getElementById('statEmailNum').textContent = '…';
  document.getElementById('statRemNum').textContent = '…';

  const [cal, emails, reminders] = await Promise.all([loadCalendar(), loadEmails(), loadReminders()]);

  // AI summary
  loadAI(cal, emails, reminders);

  // Update refresh button
  btn.disabled = false;
  icon.className = '';
  icon.textContent = '⟳';
  txt.textContent = 'Refresh';

  const now = new Date();
  document.getElementById('lastRefresh').textContent = `Last refreshed: ${now.toLocaleTimeString('en-SG')}`;
}

// Start on load
loadAll();
</script>
</body>
</html>
