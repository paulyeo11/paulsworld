<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paul's Daily Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--border:#21262d;
  --accent:#3b82f6;--accentS:rgba(59,130,246,.15);
  --gold:#f59e0b;--goldS:rgba(245,158,11,.12);
  --green:#10b981;--greenS:rgba(16,185,129,.12);
  --red:#ef4444;--redS:rgba(239,68,68,.12);
  --purple:#8b5cf6;--purpleS:rgba(139,92,246,.12);
  --text:#e6edf3;--muted:#7d8590;--sub:#30363d;
}
body{background:var(--bg);font-family:'Sora',sans-serif;color:var(--text);min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* header */
.header{
  background:linear-gradient(135deg,#1a274488 0%,#0d1117 100%);
  border-bottom:1px solid var(--border);
  padding:18px 18px 14px;
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(10px);
}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.date-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.greeting{font-size:20px;font-weight:700;line-height:1.2}
.sub-text{font-size:12px;color:var(--muted);margin-top:3px}
.refresh-btn{
  background:var(--accentS);border:1px solid rgba(59,130,246,.4);
  border-radius:10px;padding:8px 14px;color:var(--accent);
  font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'Sora',sans-serif;transition:background .2s;
}
.refresh-btn:hover{background:rgba(59,130,246,.25)}
.refresh-btn:disabled{opacity:.5;cursor:default}
.home-btn{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:10px;background:var(--goldS);border:1px solid rgba(245,158,11,.4);
  border-radius:8px;padding:5px 12px;color:var(--gold);
  font-size:12px;font-weight:700;text-decoration:none;
}
.last-refresh{font-size:10px;color:var(--muted);margin-top:5px}

/* content */
.content{padding:18px 14px 40px;max-width:680px;margin:0 auto}

/* section */
.section{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:16px;
  animation:fadeUp .4s ease both;
}
.section-head{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--border);
}
.section-icon{font-size:18px}
.section-title{font-weight:700;font-size:14px;letter-spacing:.3px}
.spinner{
  margin-left:auto;width:15px;height:15px;
  border:2px solid var(--border);border-top:2px solid var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
}
.section-body{padding:10px 14px}

/* event card */
.event-card{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--border)}
.event-time{
  min-width:50px;text-align:center;background:var(--accentS);
  border-radius:8px;padding:5px 3px;font-size:10px;font-weight:700;
  color:var(--accent);font-family:monospace;
  display:flex;flex-direction:column;justify-content:center;line-height:1.4;
}
.event-info{flex:1}
.event-title{font-size:13px;font-weight:600;color:var(--text)}
.event-loc{font-size:11px;color:var(--muted);margin-top:2px}
.event-date{font-size:10px;color:var(--muted);margin-top:1px}

/* email card */
.email-card{padding:9px 2px;border-bottom:1px solid var(--border);display:flex;gap:9px;align-items:flex-start}
.unread-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.email-from{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.email-date{font-size:10px;color:var(--muted);flex-shrink:0}
.email-subject{font-size:12px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-snippet{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* reminder card */
.rem-card{display:flex;gap:9px;padding:9px 2px;border-bottom:1px solid var(--border);align-items:flex-start}
.rem-title{font-size:13px;font-weight:600;color:var(--text)}
.rem-due{font-size:11px;color:var(--gold);margin-top:2px}
.rem-note{font-size:11px;color:var(--muted);margin-top:1px}

/* briefing */
.briefing-text{font-size:13px;color:var(--text);line-height:1.8;font-family:'Lora',serif}
.briefing-bullet{display:flex;gap:8px;margin-bottom:5px}
.briefing-para{margin-bottom:8px}

.empty-msg{color:var(--muted);font-size:12px;text-align:center;padding:12px 0}
.footer{text-align:center;color:var(--muted);font-size:10px;margin-top:20px}

/* loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--sub) 25%,var(--border) 50%,var(--sub) 75%);
  background-size:200% 100%;animation:pulse 1.4s ease infinite;
  border-radius:6px;height:13px;margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="date-label" id="dateLabel"></div>
      <div class="greeting" id="greetingText"></div>
      <div class="sub-text">Your AI assistant has your day covered</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">🔄 Refresh</button>
  </div>
  <a href="https://paulsworld.vercel.app/" class="home-btn">🏠 Paul's World</a>
  <div class="last-refresh" id="lastRefresh"></div>
</div>

<div class="content">

  <!-- AI Briefing -->
  <div class="section" style="animation-delay:.05s">
    <div class="section-head" style="background:linear-gradient(90deg,rgba(245,158,11,.12),transparent)">
      <span class="section-icon">🤖</span>
      <span class="section-title" style="color:var(--gold)">AI Morning Briefing</span>
      <div class="spinner" id="spinBriefing" style="display:none;border-top-color:var(--gold)"></div>
    </div>
    <div class="section-body" id="briefingBody">
      <div class="skeleton" style="width:100%"></div>
      <div class="skeleton" style="width:90%"></div>
      <div class="skeleton" style="width:80%"></div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="section" style="animation-delay:.1s">
    <div class="section-head" style="background:linear-gradient(90deg,var(--accentS),transparent)">
      <span class="section-icon">📅</span>
      <span class="section-title" style="color:var(--accent)">Calendar — Today & This Week</span>
      <div class="spinner" id="spinCal" style="display:none"></div>
    </div>
    <div class="section-body" id="calBody">
      <div class="skeleton" style="width:100%"></div>
      <div class="skeleton" style="width:85%"></div>
    </div>
  </div>

  <!-- Email -->
  <div class="section" style="animation-delay:.15s">
    <div class="section-head" style="background:linear-gradient(90deg,var(--purpleS),transparent)">
      <span class="section-icon">✉️</span>
      <span class="section-title" style="color:var(--purple)">Important Emails</span>
      <div class="spinner" id="spinEmail" style="display:none;border-top-color:var(--purple)"></div>
    </div>
    <div class="section-body" id="emailBody">
      <div class="skeleton" style="width:100%"></div>
      <div class="skeleton" style="width:90%"></div>
    </div>
  </div>

  <!-- Reminders -->
  <div class="section" style="animation-delay:.2s">
    <div class="section-head" style="background:linear-gradient(90deg,var(--greenS),transparent)">
      <span class="section-icon">🔔</span>
      <span class="section-title" style="color:var(--green)">Reminders & To-Do</span>
    </div>
    <div class="section-body" id="remBody">
      <div class="skeleton" style="width:80%"></div>
    </div>
  </div>

  <div class="footer">Paul's World · Daily Briefing · Powered by Claude AI</div>
</div>

<script>
const API = "https://api.anthropic.com/v1/messages";
const GMAIL_MCP = "https://gmailmcp.googleapis.com/mcp/v1";
const CAL_MCP   = "https://calendarmcp.googleapis.com/mcp/v1";

// ── init header ──────────────────────────────────────────────────────────
function initHeader(){
  const now = new Date();
  document.getElementById("dateLabel").textContent =
    now.toLocaleDateString([],{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const h = now.getHours();
  const g = h<12?"Good morning":h<17?"Good afternoon":"Good evening";
  document.getElementById("greetingText").textContent = `${g}, Paul 👋`;
}

// ── formatting ───────────────────────────────────────────────────────────
function fmt(iso){if(!iso)return"";try{return new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}catch(e){return iso}}
function fmtDate(iso){if(!iso)return"";try{return new Date(iso).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"})}catch(e){return iso}}

// ── render helpers ───────────────────────────────────────────────────────
function renderEmpty(id){document.getElementById(id).innerHTML='<p class="empty-msg">Nothing to show ✓</p>'}

function renderCalendar(events){
  const el = document.getElementById("calBody");
  if(!events||!events.length){renderEmpty("calBody");return}
  el.innerHTML = events.map(ev=>{
    const start = ev.start?.dateTime||ev.start?.date;
    const end   = ev.end?.dateTime||ev.end?.date;
    const isAllDay = !ev.start?.dateTime;
    const timeHtml = isAllDay
      ? `<span>ALL<br>DAY</span>`
      : `<span>${fmt(start)}</span><span style="color:var(--muted);font-weight:400">—</span><span>${fmt(end)}</span>`;
    return `<div class="event-card">
      <div class="event-time">${timeHtml}</div>
      <div class="event-info">
        <div class="event-title">${ev.summary||"Untitled"}</div>
        ${ev.location?`<div class="event-loc">📍 ${ev.location}</div>`:""}
        ${!isAllDay?`<div class="event-date">${fmtDate(start)}</div>`:""}
      </div>
    </div>`;
  }).join("");
}

function renderEmails(emails){
  const el = document.getElementById("emailBody");
  if(!emails||!emails.length){renderEmpty("emailBody");return}
  el.innerHTML = emails.map(msg=>{
    const from = (msg.from||"Unknown").replace(/<.*>/,"").trim();
    const dotColor = msg.unread?"var(--accent)":"var(--sub)";
    const dotBorder = msg.unread?"var(--accent)":"var(--sub)";
    const subjectWeight = msg.unread?"600":"400";
    return `<div class="email-card">
      <div class="unread-dot" style="background:${dotColor};border:2px solid ${dotBorder}"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;gap:6px">
          <span class="email-from" style="font-weight:${msg.unread?700:500}">${from}</span>
          <span class="email-date">${fmtDate(msg.date)}</span>
        </div>
        <div class="email-subject" style="color:${msg.unread?"var(--text)":"var(--muted)"};font-weight:${subjectWeight}">${msg.subject||"(No subject)"}</div>
        ${msg.snippet?`<div class="email-snippet">${msg.snippet}</div>`:""}
      </div>
    </div>`;
  }).join("");
}

function renderReminders(rems){
  const el = document.getElementById("remBody");
  if(!rems||!rems.length){renderEmpty("remBody");return}
  const icon = p => p==="high"?"🔴":p==="medium"?"🟡":"🟢";
  el.innerHTML = rems.map(r=>`
    <div class="rem-card">
      <span style="font-size:15px;margin-top:1px">${icon(r.priority)}</span>
      <div>
        <div class="rem-title">${r.title}</div>
        ${r.dueDate?`<div class="rem-due">Due: ${fmtDate(r.dueDate)}</div>`:""}
        ${r.notes?`<div class="rem-note">${r.notes}</div>`:""}
      </div>
    </div>`).join("") +
    `<p style="font-size:10px;color:var(--muted);margin-top:8px;text-align:center">* Reminders synced from your device via Claude</p>`;
}

function renderBriefing(text){
  const el = document.getElementById("briefingBody");
  if(!text){el.innerHTML='<p class="empty-msg">Unable to generate briefing.</p>';return}
  const lines = text.split("\n").filter(Boolean);
  el.innerHTML = `<div class="briefing-text">`+lines.map(line=>{
    const isBullet = line.startsWith("- ")||line.startsWith("• ");
    const clean = isBullet?line.slice(2):line;
    const formatted = clean.replace(/\*\*(.*?)\*\*/g,`<strong style="color:var(--gold);font-weight:700">$1</strong>`);
    return isBullet
      ? `<div class="briefing-bullet"><span style="color:var(--accent)">▸</span><span>${formatted}</span></div>`
      : `<p class="briefing-para">${formatted}</p>`;
  }).join("")+`</div>`;
}

// ── API call helper ──────────────────────────────────────────────────────
async function callClaude({system,user,mcpServers}){
  const body = {
    model:"claude-sonnet-4-20250514",
    max_tokens:1000,
    system,
    messages:[{role:"user",content:user}],
  };
  if(mcpServers) body.mcp_servers = mcpServers;
  const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

// ── fetch calendar ───────────────────────────────────────────────────────
async function fetchCalendar(){
  document.getElementById("spinCal").style.display="block";
  let events=[];
  try{
    const now=new Date(),wk=new Date(now.getTime()+7*24*60*60*1000);
    const raw=await callClaude({
      system:"List upcoming calendar events as JSON array only. Each: {summary,start:{dateTime or date},end:{dateTime or date},location}. No markdown.",
      user:`List calendar events from ${now.toISOString()} to ${wk.toISOString()}. JSON array only.`,
      mcpServers:[{type:"url",url:CAL_MCP,name:"gcal"}]
    });
    const clean=raw.replace(/```json|```/g,"").trim();
    events=JSON.parse(clean.match(/\[[\s\S]*\]/)?.[0]||"[]");
  }catch(e){console.error("Calendar",e)}
  document.getElementById("spinCal").style.display="none";
  renderCalendar(events);
  return events;
}

// ── fetch email ──────────────────────────────────────────────────────────
async function fetchEmail(){
  document.getElementById("spinEmail").style.display="block";
  let emails=[];
  try{
    const raw=await callClaude({
      system:"List important/unread Gmail emails as JSON array only. Max 8. Each: {from,subject,snippet,date,unread:bool}. No markdown.",
      user:"List my important and unread emails from the last 3 days. JSON array only.",
      mcpServers:[{type:"url",url:GMAIL_MCP,name:"gmail"}]
    });
    const clean=raw.replace(/```json|```/g,"").trim();
    emails=JSON.parse(clean.match(/\[[\s\S]*\]/)?.[0]||"[]");
  }catch(e){console.error("Email",e)}
  document.getElementById("spinEmail").style.display="none";
  renderEmails(emails);
  return emails;
}

// ── reminders (static for artifact; device-powered in full app) ──────────
function loadReminders(){
  const today=new Date().toISOString();
  const rems=[
    {title:"Check travel insurance renewal",dueDate:today,priority:"high"},
    {title:"Review AI article draft",dueDate:today,priority:"medium"},
    {title:"Book Bali flights — research options",priority:"low"},
    {title:"Call Joanne — confirm dinner plans",dueDate:today,priority:"medium"},
  ];
  renderReminders(rems);
  return rems;
}

// ── AI briefing ──────────────────────────────────────────────────────────
async function fetchBriefing(events,emails,reminders){
  document.getElementById("spinBriefing").style.display="block";
  try{
    const ctx=`Today: ${new Date().toLocaleDateString([],{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
Calendar: ${JSON.stringify(events.slice(0,6))}
Emails: ${JSON.stringify(emails.slice(0,5))}
Reminders: ${JSON.stringify(reminders.slice(0,4))}`;
    const text=await callClaude({
      system:"You are Paul's personal AI. Paul is a 70-year-old retired adventurer who loves travel, adventure sports, and AI. Write a warm concise personal morning briefing (150 words). Use **bold** for highlights. Use bullet points (- ) for key actions. Start straight with day summary — no greeting.",
      user:`Write my morning briefing:\n${ctx}`
    });
    renderBriefing(text);
  }catch(e){
    console.error("Briefing",e);
    document.getElementById("briefingBody").innerHTML='<p class="empty-msg">⚠️ Unable to generate briefing. Please refresh.</p>';
  }
  document.getElementById("spinBriefing").style.display="none";
}

// ── load all ─────────────────────────────────────────────────────────────
async function loadAll(){
  const btn=document.getElementById("refreshBtn");
  btn.disabled=true;
  // reset skeletons
  ["calBody","emailBody","briefingBody"].forEach(id=>{
    document.getElementById(id).innerHTML='<div class="skeleton" style="width:100%"></div><div class="skeleton" style="width:80%"></div>';
  });
  document.getElementById("remBody").innerHTML='<div class="skeleton" style="width:75%"></div>';

  const [events,emails] = await Promise.all([fetchCalendar(), fetchEmail()]);
  const reminders = loadReminders();
  await fetchBriefing(events,emails,reminders);

  document.getElementById("lastRefresh").textContent="Last updated: "+new Date().toLocaleTimeString();
  btn.disabled=false;
}

// ── start ────────────────────────────────────────────────────────────────
initHeader();
loadAll();
</script>
</body>
</html>
