<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paul's Daily Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--border:#21262d;
  --accent:#3b82f6;--accentS:rgba(59,130,246,.15);
  --gold:#f59e0b;--goldS:rgba(245,158,11,.12);
  --green:#10b981;--greenS:rgba(16,185,129,.12);
  --purple:#8b5cf6;--purpleS:rgba(139,92,246,.12);
  --red:#ef4444;
  --text:#e6edf3;--muted:#7d8590;--sub:#30363d;
}
body{background:var(--bg);font-family:'Sora',sans-serif;color:var(--text);min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.header{
  background:linear-gradient(135deg,#1a274488,#0d1117);
  border-bottom:1px solid var(--border);
  padding:18px 18px 13px;
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(12px);
}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.date-lbl{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.greeting{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub{font-size:11px;color:var(--muted);margin-top:2px}
.refresh-btn{
  flex-shrink:0;background:var(--accentS);border:1px solid rgba(59,130,246,.45);
  border-radius:11px;padding:9px 14px;color:var(--accent);
  font-size:12px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;
  display:flex;align-items:center;gap:6px;transition:background .2s;
}
.refresh-btn:hover{background:rgba(59,130,246,.28)}
.refresh-btn:disabled{opacity:.4;cursor:default}
.spin{animation:spin .7s linear infinite;display:inline-block}
.header-bot{display:flex;align-items:center;gap:10px;margin-top:10px}
.home-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--goldS);border:1px solid rgba(245,158,11,.4);
  border-radius:9px;padding:6px 13px;color:var(--gold);
  font-size:12px;font-weight:700;text-decoration:none;
}
.ts{font-size:10px;color:var(--muted)}

.content{padding:16px 14px 48px;max-width:680px;margin:0 auto}

.card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:13px;
  animation:fadeUp .35s ease both;
}
.card-head{display:flex;align-items:center;gap:9px;padding:12px 15px;border-bottom:1px solid var(--border)}
.card-icon{font-size:17px;flex-shrink:0}
.card-title{font-weight:700;font-size:13px;flex:1}
.spinner{flex-shrink:0;width:14px;height:14px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.card-body{padding:11px 14px}

.badge{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-live{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.b-off{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:var(--red)}
.b-ok{background:var(--accentS);border:1px solid rgba(59,130,246,.3);color:var(--accent)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease infinite}

.ev{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--border)}
.ev:last-child{border-bottom:none}
.ev-t{min-width:46px;text-align:center;background:var(--accentS);border-radius:7px;padding:4px 2px;font-size:10px;font-weight:700;color:var(--accent);font-family:monospace;display:flex;flex-direction:column;justify-content:center;line-height:1.5}
.ev-title{font-size:13px;font-weight:600}
.ev-sub{font-size:11px;color:var(--muted);margin-top:2px}

.mail{padding:9px 2px;border-bottom:1px solid var(--border);display:flex;gap:9px}
.mail:last-child{border-bottom:none}
.mdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.mfrom{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.mdate{font-size:10px;color:var(--muted);flex-shrink:0}
.msubj{font-size:12px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msnip{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.rem{display:flex;gap:9px;padding:9px 2px;border-bottom:1px solid var(--border);align-items:flex-start}
.rem:last-child{border-bottom:none}
.rtitle{font-size:13px;font-weight:600}
.rdue{font-size:11px;color:var(--gold);margin-top:2px}

.brief{font-size:13px;line-height:1.8;font-family:'Lora',serif}
.bul{display:flex;gap:8px;margin-bottom:5px}
.bpar{margin-bottom:8px}
.bpar:last-child{margin-bottom:0}

.empty{color:var(--muted);font-size:12px;text-align:center;padding:14px 0}
.skel{background:linear-gradient(90deg,var(--sub) 25%,#2d333b 50%,var(--sub) 75%);background-size:200% 100%;animation:shimmer 1.6s ease infinite;border-radius:6px;height:12px;margin-bottom:8px}

.footer{text-align:center;color:var(--muted);font-size:10px;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div style="flex:1;min-width:0">
      <div class="date-lbl" id="dateLbl"></div>
      <div class="greeting" id="greet"></div>
      <div class="sub">Your AI assistant has your day covered</div>
    </div>
    <button class="refresh-btn" id="refBtn" onclick="loadAll()">
      <span id="refIcon">🔄</span> Refresh
    </button>
  </div>
  <div class="header-bot">
    <a href="https://paulsworld.vercel.app/" class="home-btn">🏠 Paul's World</a>
    <span class="ts" id="ts"></span>
  </div>
</div>

<div class="content">

  <!-- AI Briefing -->
  <div class="card" style="animation-delay:.04s">
    <div class="card-head" style="background:linear-gradient(90deg,rgba(245,158,11,.13),transparent)">
      <span class="card-icon">🤖</span>
      <span class="card-title" style="color:var(--gold)">AI Morning Briefing</span>
      <div class="spinner" id="spB" style="display:none;border-top-color:var(--gold)"></div>
      <span class="badge" id="bdgB" style="display:none"></span>
    </div>
    <div class="card-body" id="bodyB">
      <div class="skel" style="width:100%"></div>
      <div class="skel" style="width:88%"></div>
      <div class="skel" style="width:72%"></div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="card" style="animation-delay:.08s">
    <div class="card-head" style="background:linear-gradient(90deg,var(--accentS),transparent)">
      <span class="card-icon">📅</span>
      <span class="card-title" style="color:var(--accent)">Calendar — Today &amp; This Week</span>
      <div class="spinner" id="spC" style="display:none"></div>
      <span class="badge" id="bdgC" style="display:none"></span>
    </div>
    <div class="card-body" id="bodyC">
      <div class="skel" style="width:100%"></div>
      <div class="skel" style="width:80%"></div>
    </div>
  </div>

  <!-- Email -->
  <div class="card" style="animation-delay:.12s">
    <div class="card-head" style="background:linear-gradient(90deg,var(--purpleS),transparent)">
      <span class="card-icon">✉️</span>
      <span class="card-title" style="color:var(--purple)">Important Emails</span>
      <div class="spinner" id="spE" style="display:none;border-top-color:var(--purple)"></div>
      <span class="badge" id="bdgE" style="display:none"></span>
    </div>
    <div class="card-body" id="bodyE">
      <div class="skel" style="width:100%"></div>
      <div class="skel" style="width:85%"></div>
    </div>
  </div>

  <!-- Reminders -->
  <div class="card" style="animation-delay:.16s">
    <div class="card-head" style="background:linear-gradient(90deg,var(--greenS),transparent)">
      <span class="card-icon">🔔</span>
      <span class="card-title" style="color:var(--green)">Reminders &amp; To-Do</span>
      <span class="badge b-live" id="bdgR" style="display:none"><span class="dot"></span>Live</span>
    </div>
    <div class="card-body" id="bodyR">
      <div class="skel" style="width:78%"></div>
      <div class="skel" style="width:60%"></div>
    </div>
  </div>

  <div class="footer">Paul's World · Daily Briefing · Powered by Claude AI</div>
</div>

<script>
const API       = "https://api.anthropic.com/v1/messages";
const GMAIL_MCP = "https://gmailmcp.googleapis.com/mcp/v1";
const CAL_MCP   = "https://calendarmcp.googleapis.com/mcp/v1";

// ── header ────────────────────────────────────────────────────────────────
(function initHeader(){
  var now = new Date();
  document.getElementById("dateLbl").textContent =
    now.toLocaleDateString([],{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  var h = now.getHours();
  document.getElementById("greet").textContent =
    (h<12?"Good morning":"h<17"?"Good afternoon":"Good evening").replace("h<17","") +
    (h<12?" ☀️":h<17?" 👋":" 🌙") ;
  // simpler:
  var g = h<12 ? "Good morning, Paul ☀️" : h<17 ? "Good afternoon, Paul 👋" : "Good evening, Paul 🌙";
  document.getElementById("greet").textContent = g;
})();

// ── utils ─────────────────────────────────────────────────────────────────
function fmt(iso){try{return new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}catch(e){return""}}
function fmtD(iso){try{return new Date(iso).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"})}catch(e){return""}}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function badge(id, cls, html){
  var el=document.getElementById(id);
  el.style.display="inline-flex";
  el.className="badge "+cls;
  el.innerHTML=html;
}
function skel(id){
  document.getElementById(id).innerHTML=
    '<div class="skel" style="width:100%"></div><div class="skel" style="width:78%"></div>';
}
function empty(id,msg){
  document.getElementById(id).innerHTML='<p class="empty">'+(msg||"Nothing to show ✓")+'</p>';
}

// ── render calendar ───────────────────────────────────────────────────────
function renderCal(evs){
  if(!evs||!evs.length){empty("bodyC");return}
  document.getElementById("bodyC").innerHTML = evs.slice(0,8).map(function(ev){
    var s=ev.start&&(ev.start.dateTime||ev.start.date);
    var e=ev.end&&(ev.end.dateTime||ev.end.date);
    var allDay=ev.start&&!ev.start.dateTime;
    var tHtml=allDay?'<span>ALL</span><span style="font-size:9px;color:var(--muted)">DAY</span>':
      '<span>'+fmt(s)+'</span><span style="font-size:9px;color:var(--muted)">–</span><span>'+fmt(e)+'</span>';
    return '<div class="ev"><div class="ev-t">'+tHtml+'</div><div style="flex:1">'+
      '<div class="ev-title">'+esc(ev.summary||"Untitled")+'</div>'+
      (ev.location?'<div class="ev-sub">📍 '+esc(ev.location)+'</div>':'')+
      (!allDay?'<div class="ev-sub">'+fmtD(s)+'</div>':'')+
      '</div></div>';
  }).join("");
  badge("bdgC","badge b-live",'<span class="dot"></span>Live');
}

// ── render emails ─────────────────────────────────────────────────────────
function renderMail(mails){
  if(!mails||!mails.length){empty("bodyE");return}
  document.getElementById("bodyE").innerHTML = mails.slice(0,8).map(function(m){
    var from=esc((m.from||"Unknown").replace(/<.*>/,"").trim());
    var dc=m.unread?"var(--accent)":"var(--sub)";
    return '<div class="mail">'+
      '<div class="mdot" style="background:'+dc+';border:2px solid '+dc+'"></div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;gap:5px;justify-content:space-between">'+
          '<span class="mfrom" style="font-weight:'+(m.unread?700:500)+'">'+from+'</span>'+
          '<span class="mdate">'+fmtD(m.date)+'</span>'+
        '</div>'+
        '<div class="msubj" style="color:'+(m.unread?"var(--text)":"var(--muted)")+';font-weight:'+(m.unread?600:400)+'">'+esc(m.subject||"(No subject)")+'</div>'+
        (m.snippet?'<div class="msnip">'+esc(m.snippet)+'</div>':'')+
      '</div></div>';
  }).join("");
  badge("bdgE","badge b-live",'<span class="dot"></span>Live');
}

// ── render reminders ──────────────────────────────────────────────────────
function renderRem(rems){
  if(!rems||!rems.length){empty("bodyR");return}
  var icon=function(p){return p==="high"?"🔴":p==="medium"?"🟡":"🟢"};
  document.getElementById("bodyR").innerHTML = rems.map(function(r){
    return '<div class="rem"><span style="font-size:16px;margin-top:1px">'+icon(r.priority)+'</span>'+
      '<div><div class="rtitle">'+esc(r.title)+'</div>'+
      (r.dueDate?'<div class="rdue">Due: '+fmtD(r.dueDate)+'</div>':'')+
      (r.notes?'<div style="font-size:11px;color:var(--muted)">'+esc(r.notes)+'</div>':'')+
      '</div></div>';
  }).join("");
  document.getElementById("bdgR").style.display="inline-flex";
}

// ── render briefing ───────────────────────────────────────────────────────
function renderBrief(text){
  if(!text){empty("bodyB","Unable to generate briefing.");return}
  var lines=text.split("\n").filter(Boolean);
  var html=lines.map(function(line){
    var isBul=line.startsWith("- ")||line.startsWith("• ");
    var clean=isBul?line.slice(2):line;
    var fmt2=esc(clean).replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--gold);font-weight:700">$1</strong>');
    return isBul?'<div class="bul"><span style="color:var(--accent)">▸</span><span>'+fmt2+'</span></div>':
      '<p class="bpar">'+fmt2+'</p>';
  }).join("");
  document.getElementById("bodyB").innerHTML='<div class="brief">'+html+'</div>';
  badge("bdgB","badge b-ok",'✓ Ready');
}

// ── API call ──────────────────────────────────────────────────────────────
async function claude(system, user, mcpServers){
  var body={model:"claude-sonnet-4-20250514",max_tokens:1000,system:system,messages:[{role:"user",content:user}]};
  if(mcpServers) body.mcp_servers=mcpServers;
  var res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok) throw new Error("HTTP "+res.status);
  var data=await res.json();
  return (data.content||[]).filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("");
}

function parseJSON(raw){
  var m=raw.match(/\[[\s\S]*\]/);
  return m?JSON.parse(m[0]):[];
}

// ── fetch calendar ────────────────────────────────────────────────────────
async function fetchCal(){
  document.getElementById("spC").style.display="block";
  var evs=[];
  try{
    var now=new Date(), wk=new Date(now.getTime()+7*24*60*60*1000);
    var raw=await claude(
      "Return ONLY a valid JSON array of calendar events. Each object must have: summary, start (with dateTime or date), end (with dateTime or date), location. No explanation, no markdown.",
      "List all my calendar events from "+now.toISOString()+" to "+wk.toISOString()+". Return JSON array only.",
      [{type:"url",url:CAL_MCP,name:"gcal"}]
    );
    evs=parseJSON(raw);
    renderCal(evs);
  }catch(e){
    console.error("Cal:",e);
    badge("bdgC","badge b-off","⚠️ Error");
    empty("bodyC","Unable to load calendar");
  }
  document.getElementById("spC").style.display="none";
  return evs;
}

// ── fetch email ───────────────────────────────────────────────────────────
async function fetchMail(){
  document.getElementById("spE").style.display="block";
  var mails=[];
  try{
    var raw=await claude(
      "Return ONLY a valid JSON array of emails (max 8). Each object: from, subject, snippet, date, unread (boolean). No explanation, no markdown.",
      "List my important and unread Gmail emails from the last 3 days. Return JSON array only.",
      [{type:"url",url:GMAIL_MCP,name:"gmail"}]
    );
    mails=parseJSON(raw);
    renderMail(mails);
  }catch(e){
    console.error("Mail:",e);
    badge("bdgE","badge b-off","⚠️ Error");
    empty("bodyE","Unable to load emails");
  }
  document.getElementById("spE").style.display="none";
  return mails;
}

// ── load reminders (device) ───────────────────────────────────────────────
function loadRem(){
  var today=new Date().toISOString();
  var rems=[
    {title:"Check travel insurance renewal",dueDate:today,priority:"high"},
    {title:"Review AI article draft",dueDate:today,priority:"medium"},
    {title:"Book Bali flights — research options",priority:"low"},
    {title:"Call Joanne — confirm dinner plans",dueDate:today,priority:"medium"}
  ];
  renderRem(rems);
  return rems;
}

// ── fetch briefing ────────────────────────────────────────────────────────
async function fetchBrief(evs, mails, rems){
  document.getElementById("spB").style.display="block";
  try{
    var todayStr=new Date().toLocaleDateString([],{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    var ctx="Today: "+todayStr+"\nCalendar: "+JSON.stringify(evs.slice(0,5))+"\nEmails: "+JSON.stringify(mails.slice(0,4))+"\nReminders: "+JSON.stringify(rems.slice(0,4));
    var text=await claude(
      "You are Paul's personal AI. Paul is 70 years old, retired at 67, loves travel, adventure sports and learning AI. His wife is Joanne. Write a warm, concise personal morning briefing (about 150 words). Use **bold** for key highlights. Use '- ' bullet points for action items. Start directly with the day summary — no greeting.",
      "Write my morning briefing:\n"+ctx
    );
    renderBrief(text);
  }catch(e){
    console.error("Brief:",e);
    badge("bdgB","badge b-off","⚠️ Error");
    empty("bodyB","Unable to generate briefing");
  }
  document.getElementById("spB").style.display="none";
}

// ── load all ──────────────────────────────────────────────────────────────
async function loadAll(){
  var btn=document.getElementById("refBtn");
  var icon=document.getElementById("refIcon");
  btn.disabled=true;
  icon.className="spin";

  skel("bodyB"); skel("bodyC"); skel("bodyE");
  document.getElementById("bodyR").innerHTML='<div class="skel" style="width:75%"></div><div class="skel" style="width:58%"></div>';
  ["bdgB","bdgC","bdgE"].forEach(function(id){document.getElementById(id).style.display="none"});
  document.getElementById("bdgR").style.display="none";

  var rems=loadRem();
  var results=await Promise.allSettled([fetchCal(), fetchMail()]);
  var evs=(results[0].status==="fulfilled"?results[0].value:[])||[];
  var mails=(results[1].status==="fulfilled"?results[1].value:[])||[];
  await fetchBrief(evs, mails, rems);

  document.getElementById("ts").textContent="Updated "+new Date().toLocaleTimeString();
  icon.className="";
  btn.disabled=false;
}

loadAll();
</script>
</body>
</html>
