[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/view-counter.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
