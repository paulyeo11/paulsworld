<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel to Curry Lunch — Tsubara Tsubara</title>
<link rel="apple-touch-icon" sizes="180x180" href="/japan-icon.png">
<link rel="icon" type="image/png" href="/japan-icon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, system-ui, sans-serif;
    background: #0d1117; color: #e6edf3;
  }
  .header {
    padding: 16px 18px 10px; text-align: center;
  }
  .header h1 { font-size: 1.15em; margin: 0 0 4px; }
  .header p { font-size: 0.85em; color: #8b949e; margin: 0; }
  .map-wrap { position: relative; }
  #map { width: 100%; height: 62vh; }
  #map.map-fullscreen {
    position: fixed !important; top: 0; left: 0;
    width: 100vw !important; height: 100vh !important; height: 100dvh !important;
    z-index: 9999; border-radius: 0 !important;
  }
  .map-fullscreen-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(240,165,0,0.15); border: 1px solid rgba(240,165,0,0.4);
    color: #f0a500; font-size: 0.78em; font-weight: 700;
    padding: 6px 14px; border-radius: 18px; cursor: pointer;
    margin: 0 16px 10px;
  }
  #mapCloseBtn {
    display: none; position: fixed; top: 14px; right: 14px; z-index: 10000;
    background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 1rem; padding: 8px 16px; border-radius: 22px;
    cursor: pointer; align-items: center; gap: 6px;
  }
  .controls {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: #161b22; border-top: 1px solid rgba(255,255,255,0.08);
  }
  #status { font-size: 0.85em; color: #c9d1d9; flex: 1; }
  #timeLabel { font-weight: 700; color: #58a6ff; }
  .legend {
    padding: 10px 16px 18px; font-size: 0.8em; color: #8b949e; line-height: 1.7;
  }
  .legend span.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
  .speed-control {
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px 14px;
  }
  .speed-control label { font-size: 0.8em; color: #8b949e; white-space: nowrap; }
  .speed-control input[type=range] { flex: 1; accent-color: #f0a500; }
  .speed-control #speedVal { font-size: 0.8em; color: #58a6ff; font-weight: 700; width: 34px; text-align: right; }
  .speed-control.fs-overlay {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10000;
    background: rgba(13,17,23,0.9); backdrop-filter: blur(6px);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .home-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #21262d; color: #c9d1d9; text-decoration: none;
    padding: 10px 16px; border-radius: 8px; font-size: 0.95em; font-weight: 600;
    margin: 16px auto 0; width: fit-content;
  }
  .home-wrap { display: flex; justify-content: center; padding-bottom: 18px; }
  .view-counter-wrap { text-align: center; padding: 10px 0 20px; font-size: 0.8em; color: #8b949e; }
</style>
</head>
<body>

<div class="header">
  <h1>🍛 Hotel → Curry Lunch</h1>
  <p>Torifito Hotel &amp; Pod Niseko → Tsubara Tsubara Soup Curry, Hirafu · ~20 min drive</p>
</div>

<button class="map-fullscreen-btn" onclick="openMapFullscreen()">&#9096; Open Full Screen Map</button>
<div class="map-wrap">
  <div id="map"></div>
  <div style="position:absolute;top:10px;right:48px;z-index:1000;display:flex;gap:4px;">
    <button onclick="setMapType('satellite')" id="btn-satellite" style="-webkit-appearance:none;appearance:none;background:rgba(0,0,0,0.55);color:#fff;border:1px solid rgba(255,255,255,0.5);border-radius:20px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;">🛰 Satellite</button>
    <button onclick="setMapType('street')" id="btn-street" style="-webkit-appearance:none;appearance:none;background:#f59e0b;color:#0d1117;border:none;border-radius:20px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;">🗺 Street</button>
  </div>
</div>
<button id="mapCloseBtn" onclick="closeMapFullscreen()">&#10005; Close Map</button>

<div class="controls">
  <div id="status">En route — <span id="timeLabel">10:40</span></div>
</div>

<div class="speed-control" id="speedControl">
  <label for="speedSlider">🐢 Speed</label>
  <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
  <span id="speedVal">1&times;</span>
</div>

<div class="legend">
  <span class="dot" style="background:#3fb950;"></span>Hotel (start)&nbsp;&nbsp;
  <span class="dot" style="background:#f0883e;"></span>Drive route&nbsp;&nbsp;
  <span class="dot" style="background:#f85149;"></span>Tsubara Tsubara (curry lunch)
</div>

<div class="home-wrap">
  <a class="home-btn" href="https://paulsworld.vercel.app/">🏠 Home</a>
</div>

<div class="view-counter-wrap">
  <script src="/view-counter.js"></script>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const stops = [
  { name: "Torifito Hotel & Pod Niseko", lat: 42.9007, lng: 140.7537, time: "10:40", note: "Depart hotel" },
  { name: "Kutchan / Route 58 junction", lat: 42.8830, lng: 140.7250, time: "10:48", note: "En route toward Hirafu" },
  { name: "Tsubara Tsubara Soup Curry", lat: 42.8615, lng: 140.6900, time: "11:00", note: "Arrive — curry lunch!" }
];

function openMapFullscreen() {
  if (window.self !== window.top) {
    window.top.location.href = window.location.href;
    return;
  }
  document.getElementById('map').classList.add('map-fullscreen');
  document.getElementById('mapCloseBtn').style.display = 'flex';
  document.getElementById('speedControl').classList.add('fs-overlay');
  document.body.style.overflow = 'hidden';
  setTimeout(function () { map.invalidateSize(); }, 100);
}
function closeMapFullscreen() {
  document.getElementById('map').classList.remove('map-fullscreen');
  document.getElementById('mapCloseBtn').style.display = 'none';
  document.getElementById('speedControl').classList.remove('fs-overlay');
  document.body.style.overflow = '';
  setTimeout(function () { map.invalidateSize(); }, 100);
}

const map = L.map('map', { zoomControl: true }).setView([42.88, 140.72], 11);

const tileLayers = {
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 18 }),
  street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 19 })
};
tileLayers.street.addTo(map);
let currentTile = 'street';
function setMapType(type) {
  if (type === currentTile) return;
  map.removeLayer(tileLayers[currentTile]);
  tileLayers[type].addTo(map);
  currentTile = type;
  document.getElementById('btn-satellite').style.background = type === 'satellite' ? '#f59e0b' : 'rgba(0,0,0,0.55)';
  document.getElementById('btn-satellite').style.color = type === 'satellite' ? '#0d1117' : '#fff';
  document.getElementById('btn-street').style.background = type === 'street' ? '#f59e0b' : 'rgba(0,0,0,0.55)';
  document.getElementById('btn-street').style.color = type === 'street' ? '#0d1117' : '#fff';
}

const segColors = ['#f0883e', '#f0883e'];
const fullLine = stops.map(s => [s.lat, s.lng]);

for (let i = 0; i < stops.length - 1; i++) {
  L.polyline([fullLine[i], fullLine[i+1]], { color: segColors[i], weight: 4, opacity: 0.85, dashArray: '6,8' }).addTo(map);
}

stops.forEach((s, i) => {
  const color = i === 0 ? '#3fb950' : (i === stops.length - 1 ? '#f85149' : '#f0883e');
  L.circleMarker([s.lat, s.lng], {
    radius: 7, color: '#0d1117', weight: 2, fillColor: color, fillOpacity: 1
  }).addTo(map).bindPopup(`<b>${s.name}</b><br>${s.time} — ${s.note}`);
});

map.fitBounds(fullLine, { padding: [30, 30] });

const carIcon = L.divIcon({ html: '🚗', className: '', iconSize: [26,26], iconAnchor: [13,13] });
const mover = L.marker(fullLine[0], { icon: carIcon }).addTo(map);

function toMinutes(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
const startMin = toMinutes(stops[0].time);
const endMin = toMinutes(stops[stops.length-1].time);
const totalMin = endMin - startMin;
let progress = 0;
let speedMultiplier = 1;

const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
speedSlider.addEventListener('input', () => {
  speedMultiplier = parseFloat(speedSlider.value);
  speedVal.textContent = speedMultiplier + '×';
});

function interpolate(p) {
  const targetMin = startMin + p * totalMin;
  for (let i = 0; i < stops.length - 1; i++) {
    const t0 = toMinutes(stops[i].time), t1 = toMinutes(stops[i+1].time);
    if (targetMin >= t0 && targetMin <= t1) {
      const segP = t1 > t0 ? (targetMin - t0) / (t1 - t0) : 0;
      const lat = stops[i].lat + (stops[i+1].lat - stops[i].lat) * segP;
      const lng = stops[i].lng + (stops[i+1].lng - stops[i].lng) * segP;
      const curMin = Math.round(targetMin);
      const hh = String(Math.floor(curMin/60)).padStart(2,'0');
      const mm = String(curMin%60).padStart(2,'0');
      return { lat, lng, timeStr: `${hh}:${mm}` };
    }
  }
  return { lat: stops[stops.length-1].lat, lng: stops[stops.length-1].lng, timeStr: stops[stops.length-1].time };
}

const statusEl = document.getElementById('status');
const timeLabel = document.getElementById('timeLabel');

function step() {
  progress += 0.0025 * speedMultiplier;
  if (progress >= 1) {
    const pos = interpolate(1);
    mover.setLatLng([pos.lat, pos.lng]);
    timeLabel.textContent = pos.timeStr;
    statusEl.innerHTML = `Arrived — <span id="timeLabel">${stops[stops.length-1].time}</span> · replaying...`;
    setTimeout(() => {
      progress = 0;
      statusEl.textContent = 'En route — ';
      statusEl.appendChild(timeLabel);
      requestAnimationFrame(step);
    }, 1200);
    return;
  }
  const pos = interpolate(progress);
  mover.setLatLng([pos.lat, pos.lng]);
  timeLabel.textContent = pos.timeStr;
  requestAnimationFrame(step);
}

statusEl.textContent = 'En route — ';
statusEl.appendChild(timeLabel);
step();
</script>

</body>
</html>
